<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Build Your Dream City</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --gold: #F5C842;
    --gold-dim: #b8922f;
    --dark: #0a0c10;
    --darker: #060810;
    --panel: rgba(10,12,16,0.92);
    --text: #e8e4d8;
    --muted: #7a7870;
    --accent: #4A9EFF;
    --green: #4ade80;
  }

  html, body {
    width: 100%; height: 100%; overflow: hidden;
    background: var(--dark);
    font-family: 'DM Sans', sans-serif;
    color: var(--text);
    touch-action: none;
  }

  #canvas-container {
    position: fixed; inset: 0;
    z-index: 0;
  }
  #canvas-container canvas { display: block; width: 100% !important; height: 100% !important; }

  /* ── INTRO SCREEN ── */
  #intro {
    position: fixed; inset: 0; z-index: 100;
    background: var(--darker);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 2rem;
    transition: opacity 0.8s ease;
  }
  #intro.hidden { opacity: 0; pointer-events: none; }

  .intro-title {
    font-family: 'Syne', sans-serif;
    font-size: clamp(2.2rem, 7vw, 4.5rem);
    font-weight: 800;
    color: var(--gold);
    text-align: center;
    line-height: 1.1;
    letter-spacing: -0.02em;
    margin-bottom: 1rem;
  }
  .intro-sub {
    font-size: clamp(0.9rem, 2.5vw, 1.1rem);
    color: var(--muted);
    text-align: center;
    max-width: 440px;
    line-height: 1.6;
    margin-bottom: 2.5rem;
  }
  .start-btn {
    font-family: 'Syne', sans-serif;
    font-size: 1rem;
    font-weight: 700;
    letter-spacing: 0.05em;
    color: var(--dark);
    background: var(--gold);
    border: none;
    border-radius: 100px;
    padding: 14px 40px;
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s;
  }
  .start-btn:hover { transform: scale(1.04); box-shadow: 0 0 32px rgba(245,200,66,0.4); }
  .start-btn:active { transform: scale(0.97); }

  /* ── QUESTION PANEL ── */
  #question-panel {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    z-index: 50;
    background: var(--panel);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border-top: 1px solid rgba(245,200,66,0.15);
    padding: clamp(1rem, 3vw, 1.5rem) clamp(1rem, 4vw, 2rem);
    transition: transform 0.5s cubic-bezier(0.22,1,0.36,1), opacity 0.4s;
  }
  #question-panel.hidden { transform: translateY(110%); opacity: 0; pointer-events: none; }

  .q-progress {
    display: flex; gap: 5px; margin-bottom: 1rem;
  }
  .q-dot {
    height: 3px; flex: 1; border-radius: 2px;
    background: rgba(255,255,255,0.1);
    transition: background 0.4s;
  }
  .q-dot.done { background: var(--gold); }
  .q-dot.active { background: rgba(245,200,66,0.5); }

  .q-label {
    font-family: 'Syne', sans-serif;
    font-size: clamp(1rem, 3vw, 1.3rem);
    font-weight: 700;
    color: var(--text);
    margin-bottom: 0.9rem;
    line-height: 1.3;
  }
  .q-options {
    display: flex; flex-wrap: wrap; gap: 8px;
  }
  .q-opt {
    font-family: 'DM Sans', sans-serif;
    font-size: clamp(0.8rem, 2.5vw, 0.9rem);
    font-weight: 500;
    padding: 9px 18px;
    border-radius: 100px;
    border: 1px solid rgba(255,255,255,0.15);
    background: transparent;
    color: var(--text);
    cursor: pointer;
    transition: all 0.18s;
    white-space: nowrap;
  }
  .q-opt:hover { border-color: var(--gold); color: var(--gold); }
  .q-opt.selected { background: var(--gold); color: var(--dark); border-color: var(--gold); font-weight: 700; }

  /* ── HUD (top bar) ── */
  #hud {
    position: fixed; top: 0; left: 0; right: 0; z-index: 40;
    padding: clamp(0.6rem, 2vw, 1rem) clamp(1rem, 3vw, 1.5rem);
    display: flex; align-items: center; justify-content: space-between;
    background: linear-gradient(to bottom, rgba(6,8,16,0.9) 0%, transparent 100%);
    opacity: 0; pointer-events: none;
    transition: opacity 0.6s;
  }
  #hud.visible { opacity: 1; pointer-events: all; }

  .city-name {
    font-family: 'Syne', sans-serif;
    font-size: clamp(1rem, 3.5vw, 1.4rem);
    font-weight: 800;
    color: var(--gold);
    letter-spacing: -0.01em;
  }
  .hud-right { display: flex; align-items: center; gap: 10px; }

  .hud-btn {
    font-size: 0.75rem;
    font-weight: 500;
    font-family: 'DM Sans', sans-serif;
    padding: 7px 14px;
    border-radius: 100px;
    border: 1px solid rgba(255,255,255,0.2);
    background: rgba(10,12,16,0.7);
    color: var(--text);
    cursor: pointer;
    transition: all 0.18s;
    white-space: nowrap;
  }
  .hud-btn:hover { border-color: var(--gold); color: var(--gold); }
  .hud-btn.active { background: var(--gold); color: var(--dark); border-color: var(--gold); font-weight: 700; }

  /* ── TIME SLIDER ── */
  #time-control {
    position: fixed;
    left: clamp(0.75rem, 3vw, 1.5rem);
    top: 50%; transform: translateY(-50%);
    z-index: 40;
    display: flex; flex-direction: column; align-items: center; gap: 8px;
    opacity: 0; pointer-events: none;
    transition: opacity 0.6s;
  }
  #time-control.visible { opacity: 1; pointer-events: all; }

  .time-label {
    font-family: 'Syne', sans-serif;
    font-size: 0.65rem;
    font-weight: 700;
    color: var(--muted);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    writing-mode: vertical-rl;
    transform: rotate(180deg);
  }

  #time-slider {
    -webkit-appearance: none;
    appearance: none;
    writing-mode: vertical-lr;
    direction: rtl;
    width: 4px;
    height: clamp(80px, 18vh, 140px);
    border-radius: 2px;
    background: rgba(255,255,255,0.1);
    outline: none;
    cursor: pointer;
  }
  #time-slider::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 16px; height: 16px;
    border-radius: 50%;
    background: var(--gold);
    border: 2px solid var(--dark);
    cursor: pointer;
    box-shadow: 0 0 8px rgba(245,200,66,0.6);
  }
  #time-slider::-moz-range-thumb {
    width: 16px; height: 16px;
    border-radius: 50%;
    background: var(--gold);
    border: 2px solid var(--dark);
    cursor: pointer;
  }

  .time-icon {
    font-size: 1.1rem;
    filter: drop-shadow(0 0 4px rgba(245,200,66,0.5));
  }

  /* ── COMPASS (360 indicator) ── */
  #compass {
    position: fixed;
    right: clamp(0.75rem, 3vw, 1.25rem);
    top: 50%; transform: translateY(-50%);
    z-index: 40;
    width: clamp(48px, 8vw, 64px);
    height: clamp(48px, 8vw, 64px);
    opacity: 0; pointer-events: none;
    transition: opacity 0.6s;
  }
  #compass.visible { opacity: 1; }
  #compass-svg { width: 100%; height: 100%; }

  /* ── MUSIC TOGGLE ── */
  #music-btn {
    position: fixed;
    bottom: clamp(0.75rem, 3vw, 1.25rem);
    right: clamp(0.75rem, 3vw, 1.25rem);
    z-index: 60;
    width: 44px; height: 44px;
    border-radius: 50%;
    border: 1px solid rgba(255,255,255,0.2);
    background: rgba(10,12,16,0.85);
    backdrop-filter: blur(10px);
    color: var(--text);
    font-size: 1.2rem;
    cursor: pointer;
    display: none;
    align-items: center;
    justify-content: center;
    transition: all 0.18s;
  }
  #music-btn:hover { border-color: var(--gold); transform: scale(1.08); }
  #music-btn.playing { border-color: var(--gold); color: var(--gold); }
  #music-btn.show { display: flex; }

  /* ── SCREENSHOT FLASH ── */
  #flash { position: fixed; inset: 0; z-index: 200; background: white; opacity: 0; pointer-events: none; transition: opacity 0.05s; }

  /* ── BUILDING SPAWN NOTIFICATION ── */
  #spawn-notice {
    position: fixed;
    bottom: clamp(4rem, 12vw, 5rem);
    left: 50%; transform: translateX(-50%);
    z-index: 45;
    font-family: 'Syne', sans-serif;
    font-size: 0.8rem;
    font-weight: 700;
    color: var(--gold);
    letter-spacing: 0.06em;
    opacity: 0;
    transition: opacity 0.4s;
    white-space: nowrap;
    text-transform: uppercase;
  }

  /* ── MOBILE DRAG HINT ── */
  #drag-hint {
    position: fixed;
    bottom: clamp(4rem, 12vw, 5rem);
    left: 50%; transform: translateX(-50%);
    z-index: 44;
    font-size: 0.75rem;
    color: var(--muted);
    opacity: 0;
    transition: opacity 0.6s;
    text-align: center;
    white-space: nowrap;
  }
  #drag-hint.visible { opacity: 1; }

  @media (max-width: 480px) {
    .q-options { gap: 6px; }
    .q-opt { padding: 8px 14px; }
    .hud-btn { padding: 6px 10px; font-size: 0.7rem; }
  }

  /* ── EXPLORE MODE ── */
  #explore-hud {
    position: fixed; bottom: clamp(0.75rem,3vw,1.25rem); left: 50%;
    transform: translateX(-50%);
    z-index: 60;
    display: none;
    align-items: center; gap: 10px;
    background: rgba(10,12,16,0.88);
    backdrop-filter: blur(12px);
    border: 1px solid rgba(245,200,66,0.2);
    border-radius: 100px;
    padding: 8px 18px;
    font-size: 0.78rem;
    color: var(--muted);
    white-space: nowrap;
  }
  #explore-hud.show { display: flex; }
  #explore-hud kbd {
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 4px;
    padding: 1px 6px;
    font-size: 0.72rem;
    color: var(--gold);
    font-family: monospace;
  }

  /* Mobile joystick */
  #joystick-zone {
    position: fixed; bottom: clamp(5rem,14vw,7rem); left: clamp(0.75rem,3vw,1.5rem);
    z-index: 65;
    display: none;
    width: 120px; height: 120px;
  }
  #joystick-zone.show { display: block; }
  #joystick-base {
    width: 96px; height: 96px; border-radius: 50%;
    background: rgba(245,200,66,0.15);
    border: 2px solid rgba(245,200,66,0.4);
    position: relative; left: 12px; top: 12px;
  }
  #joystick-knob {
    width: 40px; height: 40px; border-radius: 50%;
    background: var(--gold); opacity: 0.9;
    position: absolute; top: 28px; left: 28px;
    box-shadow: 0 0 10px rgba(245,200,66,0.5);
    transition: none;
  }
  #look-zone {
    position: fixed; bottom: clamp(5rem,14vw,7rem); right: clamp(0.75rem,3vw,1.5rem);
    z-index: 65;
    display: none;
    width: 110px; height: 110px;
    background: rgba(245,200,66,0.08);
    border: 1.5px solid rgba(245,200,66,0.25);
    border-radius: 18px;
    align-items: center; justify-content: center;
    color: var(--muted); font-size: 0.68rem; text-align: center;
  }
  #look-zone.show { display: flex; }
  /* Mobile talk button in explore mode */
  #mobile-talk-btn {
    position: fixed; bottom: clamp(5rem,14vw,7rem); left: 50%; transform: translateX(-50%);
    z-index: 66; display: none;
    background: var(--gold); color: var(--dark);
    border: none; border-radius: 100px; padding: 10px 22px;
    font-family: 'Syne',sans-serif; font-size: 0.85rem; font-weight: 700;
    cursor: pointer; box-shadow: 0 4px 16px rgba(245,200,66,0.4);
  }
  #mobile-talk-btn.show { display: block; }

  #exit-explore {
    position: fixed; top: clamp(0.5rem,2vw,1rem); left: 50%;
    transform: translateX(-50%);
    z-index: 70;
    display: none;
    font-family: 'Syne', sans-serif;
    font-size: 0.78rem; font-weight: 700;
    padding: 6px 18px;
    border-radius: 100px;
    border: 1px solid rgba(245,200,66,0.4);
    background: rgba(10,12,16,0.85);
    color: var(--gold); cursor: pointer;
    backdrop-filter: blur(10px);
  }
  #exit-explore.show { display: block; }
  #crosshair {
    position: fixed; top:50%; left:50%; z-index:65;
    transform: translate(-50%,-50%);
    display: none; pointer-events: none;
  }
  #crosshair.show { display: block; }

  /* People conversation panel */
  #convo-panel {
    position: fixed; bottom: 0; left: 0; right: 0; z-index: 80;
    background: rgba(8,10,16,0.97);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-top: 1px solid rgba(245,200,66,0.25);
    padding: clamp(0.75rem,3vw,1.5rem) clamp(0.75rem,4vw,2rem);
    transform: translateY(110%);
    transition: transform 0.4s cubic-bezier(0.22,1,0.36,1);
    max-height: 60vh; overflow-y: auto;
    -webkit-overflow-scrolling: touch;
  }
  @media (max-width: 480px) {
    #convo-panel { max-height: 70vh; padding: 0.75rem 1rem; }
    .convo-bubble { font-size: 0.82rem; }
    #convo-input { font-size: 0.85rem; }
    #convo-send { padding: 9px 14px; font-size: 0.8rem; }
  }
  #convo-panel.open { transform: translateY(0); }
  .convo-person-name {
    font-family:'Syne',sans-serif; font-size:1rem; font-weight:700;
    color:var(--gold); margin-bottom:0.5rem; display:flex; align-items:center; gap:8px;
  }
  .convo-avatar {
    width:32px; height:32px; border-radius:50%;
    display:inline-flex; align-items:center; justify-content:center;
    font-size:1.1rem; flex-shrink:0;
  }
  .convo-bubble {
    font-size:clamp(0.82rem,2.5vw,0.95rem); color:var(--text);
    line-height:1.6; background:rgba(255,255,255,0.06);
    border-radius:12px; padding:0.75rem 1rem; margin:0.5rem 0;
  }
  .convo-bubble.user { background:rgba(245,200,66,0.1); text-align:right; }
  .convo-input-row {
    display:flex; gap:8px; margin-top:0.75rem;
  }
  #convo-input {
    flex:1; background:rgba(255,255,255,0.08); border:1px solid rgba(255,255,255,0.15);
    border-radius:100px; padding:9px 16px; font-size:0.85rem;
    color:var(--text); font-family:'DM Sans',sans-serif; outline:none;
  }
  #convo-input:focus { border-color:rgba(245,200,66,0.5); }
  #convo-send {
    background:var(--gold); color:var(--dark); border:none;
    border-radius:100px; padding:9px 18px; font-size:0.82rem;
    font-weight:700; font-family:'Syne',sans-serif; cursor:pointer;
    white-space:nowrap;
  }
  #convo-close {
    position:absolute; top:1rem; right:1rem; background:transparent;
    border:1px solid rgba(255,255,255,0.2); border-radius:50%;
    width:30px; height:30px; color:var(--muted); cursor:pointer; font-size:1rem;
    display:flex; align-items:center; justify-content:center;
  }
  .convo-typing { color:var(--muted); font-size:0.8rem; font-style:italic; padding:0.3rem 0; }
  #talk-hint {
    position:fixed; z-index:55; background:rgba(8,10,16,0.85);
    backdrop-filter:blur(10px); border:1px solid rgba(245,200,66,0.3);
    border-radius:100px; padding:5px 14px; font-size:0.75rem; color:var(--gold);
    pointer-events:none; display:none; white-space:nowrap;
    font-family:'Syne',sans-serif; font-weight:600;
  }

  /* Stars overlay */
  #stars-canvas {
    position: fixed; inset: 0; z-index: 1;
    pointer-events: none; opacity: 0;
    transition: opacity 1.5s ease;
  }
  #stars-canvas.show { opacity: 1; }

  /* Moon */
  #moon {
    position: fixed; z-index: 2; pointer-events: none;
    width: clamp(30px,6vw,55px); height: clamp(30px,6vw,55px);
    border-radius: 50%;
    background: radial-gradient(circle at 35% 35%, #fffde0, #f0d070);
    box-shadow: 0 0 20px rgba(255,240,100,0.6), 0 0 50px rgba(255,220,50,0.2);
    opacity: 0; transition: opacity 2s ease;
    top: 12%; right: 10%;
  }
  #moon.show { opacity: 1; }


  #crosshair::before, #crosshair::after {
    content:''; position:absolute; background:rgba(255,255,255,0.7);
  }
  #crosshair::before { width:14px; height:1.5px; top:50%; left:50%; transform:translate(-50%,-50%); }
  #crosshair::after  { width:1.5px; height:14px; top:50%; left:50%; transform:translate(-50%,-50%); }
</style>
</head>
<body>

<div id="canvas-container"></div>
<div id="flash"></div>

<!-- INTRO -->
<div id="intro">
  <div class="intro-title">Build Your<br>Dream City</div>
  <div class="intro-sub">Answer 5 questions. Watch your city rise, building by building, in real time.</div>
  <button class="start-btn" onclick="startExperience()">Begin ›</button>
</div>

<!-- QUESTION PANEL -->
<div id="question-panel" class="hidden">
  <div class="q-progress" id="q-progress"></div>
  <div class="q-label" id="q-label"></div>
  <div class="q-options" id="q-options"></div>
</div>

<!-- HUD -->
<div id="hud">
  <div class="city-name" id="city-name-display">—</div>
  <div class="hud-right">
    <button class="hud-btn" id="auto-rotate-btn" onclick="toggleAutoRotate()">360°</button>
    <button class="hud-btn" id="explore-btn" onclick="enterExploreMode()">🚶 Explore</button>
    <button class="hud-btn" onclick="screenshot()">📸</button>
  </div>
</div>

<!-- TIME SLIDER -->
<div id="time-control">
  <div class="time-icon">☀️</div>
  <input type="range" id="time-slider" min="0" max="23" value="14" step="1" oninput="setTimeOfDay(this.value)">
  <div class="time-icon">🌙</div>
  <div class="time-label">Time</div>
</div>

<!-- COMPASS -->
<div id="compass">
  <svg id="compass-svg" viewBox="0 0 64 64">
    <circle cx="32" cy="32" r="30" fill="rgba(10,12,16,0.7)" stroke="rgba(245,200,66,0.3)" stroke-width="1"/>
    <text x="32" y="12" text-anchor="middle" fill="rgba(245,200,66,0.8)" font-size="8" font-family="Syne" font-weight="700">N</text>
    <text x="52" y="36" text-anchor="middle" fill="rgba(255,255,255,0.4)" font-size="7" font-family="Syne">E</text>
    <text x="32" y="56" text-anchor="middle" fill="rgba(255,255,255,0.4)" font-size="7" font-family="Syne">S</text>
    <text x="12" y="36" text-anchor="middle" fill="rgba(255,255,255,0.4)" font-size="7" font-family="Syne">W</text>
    <g id="compass-needle">
      <polygon points="32,16 29,32 32,30 35,32" fill="#F5C842"/>
      <polygon points="32,48 29,32 32,34 35,32" fill="rgba(255,255,255,0.3)"/>
    </g>
  </svg>
</div>

<!-- MUSIC -->
<button id="music-btn" onclick="toggleMusic()">♪</button>

<!-- SPAWN NOTICE -->
<div id="spawn-notice"></div>
<div id="drag-hint">Drag to look around • Pinch to zoom</div>

<canvas id="stars-canvas"></canvas>
<div id="convo-panel">
  <button id="convo-close" onclick="closeConvo()">✕</button>
  <div class="convo-person-name"><span class="convo-avatar" id="convo-avatar">👤</span><span id="convo-name">Stranger</span></div>
  <div id="convo-messages"></div>
  <div class="convo-input-row">
    <input id="convo-input" type="text" placeholder="Say something..." maxlength="120" onkeydown="if(event.key==='Enter')sendMessage()">
    <button id="convo-send" onclick="sendMessage()">Send</button>
  </div>
</div>
<div id="talk-hint">💬 Click to talk</div>
<div id="moon"></div>
<!-- EXPLORE MODE UI -->
<div id="explore-hud">
  <kbd>W</kbd><kbd>A</kbd><kbd>S</kbd><kbd>D</kbd> move &nbsp;|&nbsp; mouse look &nbsp;|&nbsp;
  <kbd>E</kbd> talk &nbsp;|&nbsp; <kbd>Shift</kbd> run &nbsp;|&nbsp; <kbd>Esc</kbd> exit
</div>
<div id="joystick-zone"><div id="joystick-base"><div id="joystick-knob"></div></div></div>
<div id="look-zone">👆 Drag<br>to look</div>
<button id="mobile-talk-btn" onclick="talkToNearest()">💬 Talk</button>
<div id="crosshair"></div>
<button id="exit-explore" onclick="exitExploreMode()">✕ Exit Walk Mode</button>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
<script>
// ════════════════════════════════════════
//  STATE
// ════════════════════════════════════════
const answers = {};
let currentQ = 0;
let cityBuilt = false;
let autoRotate = false;
let musicPlaying = false;
let audioCtx = null;
let musicNodes = [];
let timeOfDay = 14;

// orbit
const orbit = { theta: 0.6, phi: 1.05, radius: 120, targetTheta: 0.6, targetPhi: 1.05, targetRadius: 120 };
let isDragging = false, lastX = 0, lastY = 0;

// Three.js refs
let renderer, scene, camera, clock;

// ════════════════════════════════════════
//  GRID SYSTEM
//  3 roads on X: at x = -60, 0, +60  (width ±7 each)
//  3 roads on Z: at z = -60, 0, +60  (width ±7 each)
//  City blocks sit between roads, centred at ±30, ±90
//  Block safe centres: -85, -30, 30, 85
// ════════════════════════════════════════
const ROAD_POS  = [-60, 0, 60];
const ROAD_SAFE = 9;   // nothing within 9 units of a road centre
const CITY_EXT  = 95;  // city extends ±95

function onRoad(x, z) {
  for (const r of ROAD_POS) {
    if (Math.abs(x - r) < ROAD_SAFE) return true;
    if (Math.abs(z - r) < ROAD_SAFE) return true;
  }
  return false;
}

// Block centres between roads (and beyond outer roads)
const BLK = [-85, -30, 30, 85];

function buildPlotGrid(isBig) {
  const plots = [];
  const density = isBig ? 4 : 2;  // plots per block side
  const blockW  = 22;
  const step    = blockW / density;

  BLK.forEach(bx => {
    BLK.forEach(bz => {
      // Small town: only use inner 4 blocks (2x2 centre)
      if (!isBig && (Math.abs(bx) > 50 || Math.abs(bz) > 50)) return;
      for (let pi = 0; pi < density; pi++) {
        for (let pj = 0; pj < density; pj++) {
          const x = bx - blockW/2 + step*pi + step/2 + (Math.random()-0.5)*2.5;
          const z = bz - blockW/2 + step*pj + step/2 + (Math.random()-0.5)*2.5;
          if (!onRoad(x, z)) plots.push({ x, z, isCenter: Math.abs(bx)<=35 && Math.abs(bz)<=35 });
        }
      }
    });
  });
  return plots;
}

// Park spots: corners of each block, away from roads
function buildParkSpots(isBig) {
  const spots = [];
  const src = isBig ? BLK : BLK.filter(v => Math.abs(v) <= 50);
  src.forEach(bx => {
    src.forEach(bz => {
      // Place 2-3 trees per block corner area
      for (let k = 0; k < 3; k++) {
        const x = bx + (Math.random()-0.5) * 16;
        const z = bz + (Math.random()-0.5) * 16;
        if (!onRoad(x, z)) spots.push({ x, z });
      }
    });
  });
  return spots;
}

// Car paths: lane-offset lines along actual road centres
const CAR_LANES = [];
ROAD_POS.forEach(rz => {
  CAR_LANES.push({ axis:'x', fixed: rz, lane: 3.5,  from:-CITY_EXT, to: CITY_EXT });  // westbound lane
  CAR_LANES.push({ axis:'x', fixed: rz, lane:-3.5,  from: CITY_EXT, to:-CITY_EXT });  // eastbound lane
});
ROAD_POS.forEach(rx => {
  CAR_LANES.push({ axis:'z', fixed: rx, lane: 3.5,  from:-CITY_EXT, to: CITY_EXT });
  CAR_LANES.push({ axis:'z', fixed: rx, lane:-3.5,  from: CITY_EXT, to:-CITY_EXT });
});

// Street light positions: corners of intersections, on sidewalk
const LIGHT_SPOTS = [];
ROAD_POS.forEach(rx => {
  ROAD_POS.forEach(rz => {
    LIGHT_SPOTS.push({ x: rx + ROAD_SAFE + 1, z: rz + ROAD_SAFE + 1 });
    LIGHT_SPOTS.push({ x: rx - ROAD_SAFE - 1, z: rz + ROAD_SAFE + 1 });
    LIGHT_SPOTS.push({ x: rx + ROAD_SAFE + 1, z: rz - ROAD_SAFE - 1 });
    LIGHT_SPOTS.push({ x: rx - ROAD_SAFE - 1, z: rz - ROAD_SAFE - 1 });
  });
});

function initThree() {
  const isMobile = /Android|iPhone|iPad|iPod|Mobile/i.test(navigator.userAgent) || window.innerWidth < 768;
  renderer = new THREE.WebGLRenderer({ antialias: !isMobile, preserveDrawingBuffer:true, powerPreference:'high-performance' });
  renderer.setPixelRatio(isMobile ? Math.min(window.devicePixelRatio, 1.5) : Math.min(window.devicePixelRatio, 2));
  renderer.shadowMap.enabled = !isMobile; // disable shadows on mobile for performance
  renderer.shadowMap.type = THREE.PCFSoftShadowMap;
  window._isMobile = isMobile;
  renderer.toneMapping = THREE.ACESFilmicToneMapping;
  renderer.toneMappingExposure = 1.0;
  document.getElementById('canvas-container').appendChild(renderer.domElement);

  scene = new THREE.Scene();
  scene.fog = new THREE.FogExp2(0x0a0c10, window._isMobile ? 0.012 : 0.006);

  camera = new THREE.PerspectiveCamera(52, 1, 0.5, 600);
  clock  = new THREE.Clock();

  ambientLight = new THREE.AmbientLight(0x334466, 0.6);
  scene.add(ambientLight);

  sunLight = new THREE.DirectionalLight(0xfff5cc, 1.2);
  sunLight.castShadow = true;
  sunLight.shadow.mapSize.width  = window._isMobile ? 512 : 1024;
  sunLight.shadow.mapSize.height = window._isMobile ? 512 : 1024;
  sunLight.shadow.camera.near = 0.5;
  sunLight.shadow.camera.far  = 400;
  sunLight.shadow.camera.left = -120;
  sunLight.shadow.camera.right = 120;
  sunLight.shadow.camera.top  = 120;
  sunLight.shadow.camera.bottom = -120;
  sunLight.shadow.bias = -0.001;
  scene.add(sunLight);

  updateSunPosition(timeOfDay);
  createSun3D();
  resize();
  window.addEventListener('resize', () => {
    resize();
    if (starsDrawn) drawStars();
  });
  setupInput();
  registerClickLock();
  registerPeopleInput();
  animate();
}

function resize() {
  const w = window.innerWidth, h = window.innerHeight;
  renderer.setSize(w, h);
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
}

// ════════════════════════════════════════
//  ORBIT CAMERA
// ════════════════════════════════════════
function setupInput() {
  const el = renderer.domElement;
  el.addEventListener('mousedown', e => { isDragging=true; lastX=e.clientX; lastY=e.clientY; });
  window.addEventListener('mousemove', e => {
    if (!isDragging) return;
    orbit.targetTheta -= (e.clientX - lastX) * 0.005;
    orbit.targetPhi    = Math.max(0.18, Math.min(1.45, orbit.targetPhi + (e.clientY - lastY) * 0.005));
    lastX = e.clientX; lastY = e.clientY;
    autoRotate = false;
    document.getElementById('auto-rotate-btn').classList.remove('active');
  });
  window.addEventListener('mouseup', () => isDragging = false);
  el.addEventListener('wheel', e => {
    orbit.targetRadius = Math.max(25, Math.min(200, orbit.targetRadius + e.deltaY * 0.1));
  }, { passive: true });

  let lastDist = 0, touches = [];
  el.addEventListener('touchstart', e => {
    touches = [...e.touches];
    if (touches.length === 1) { isDragging=true; lastX=touches[0].clientX; lastY=touches[0].clientY; }
    if (touches.length === 2) lastDist = Math.hypot(touches[1].clientX-touches[0].clientX, touches[1].clientY-touches[0].clientY);
  }, { passive:true });
  el.addEventListener('touchmove', e => {
    e.preventDefault();
    touches = [...e.touches];
    if (touches.length === 1 && isDragging) {
      orbit.targetTheta -= (touches[0].clientX - lastX) * 0.006;
      orbit.targetPhi    = Math.max(0.18, Math.min(1.45, orbit.targetPhi + (touches[0].clientY - lastY) * 0.006));
      lastX = touches[0].clientX; lastY = touches[0].clientY;
      autoRotate = false;
      document.getElementById('auto-rotate-btn').classList.remove('active');
    }
    if (touches.length === 2) {
      const d = Math.hypot(touches[1].clientX-touches[0].clientX, touches[1].clientY-touches[0].clientY);
      orbit.targetRadius = Math.max(25, Math.min(200, orbit.targetRadius - (d - lastDist) * 0.25));
      lastDist = d;
    }
  }, { passive:false });
  el.addEventListener('touchend', () => isDragging = false);
}

function updateCamera() {
  orbit.theta  += (orbit.targetTheta  - orbit.theta)  * 0.07;
  orbit.phi    += (orbit.targetPhi    - orbit.phi)    * 0.07;
  orbit.radius += (orbit.targetRadius - orbit.radius) * 0.07;
  if (autoRotate) orbit.targetTheta += 0.003;

  const r = orbit.radius, p = orbit.phi, t = orbit.theta;
  camera.position.set(r * Math.sin(p)*Math.sin(t), r * Math.cos(p), r * Math.sin(p)*Math.cos(t));
  camera.lookAt(0, 10, 0);

  // Compass
  const needle = document.getElementById('compass-needle');
  if (needle) needle.setAttribute('transform', `rotate(${THREE.MathUtils.radToDeg(orbit.theta)}, 32, 32)`);
}

// ════════════════════════════════════════
//  SUN / TIME OF DAY
// ════════════════════════════════════════
const TIME_PRESETS = {
  // More realistic sky transitions
  5:  { sun:0xFFB060, sky:0x1a1040, ambient:0x28204a, fog:0x1a1040, exp:0.65 }, // pre-dawn purple
  7:  { sun:0xFFCC70, sky:0xff9050, ambient:0x553020, fog:0xd06030, exp:0.9  }, // sunrise orange
  9:  { sun:0xFFF0C0, sky:0x7ec8e8, ambient:0x447090, fog:0xa0d8f0, exp:1.1  }, // morning blue
  12: { sun:0xFFFFE8, sky:0x4a9fe0, ambient:0x3355aa, fog:0x80c8f0, exp:1.25 }, // noon bright
  15: { sun:0xFFF8D0, sky:0x3a8fcc, ambient:0x335588, fog:0x70b8e8, exp:1.2  }, // afternoon
  17: { sun:0xFF9030, sky:0xff7030, ambient:0x663018, fog:0xc05020, exp:1.0  }, // golden hour
  19: { sun:0xFF5020, sky:0x301828, ambient:0x3a1820, fog:0x280e18, exp:0.75 }, // dusk
  21: { sun:0x3050AA, sky:0x0c1030, ambient:0x141840, fog:0x0a0e28, exp:0.55 }, // blue hour
  23: { sun:0x1830AA, sky:0x060a1e, ambient:0x0c1235, fog:0x060812, exp:0.4  }  // deep night
};
function lerpColor(ca, cb, t) {
  const r1=(ca>>16)&0xff,g1=(ca>>8)&0xff,b1=ca&0xff;
  const r2=(cb>>16)&0xff,g2=(cb>>8)&0xff,b2=cb&0xff;
  return (Math.round(r1+(r2-r1)*t)<<16)|(Math.round(g1+(g2-g1)*t)<<8)|Math.round(b1+(b2-b1)*t);
}
function getTimePreset(h) {
  const keys = Object.keys(TIME_PRESETS).map(Number).sort((a,b)=>a-b);
  let lo=keys[0], hi=keys[keys.length-1];
  for (let i=0;i<keys.length-1;i++) { if (h>=keys[i]&&h<=keys[i+1]) { lo=keys[i]; hi=keys[i+1]; break; } }
  const t = hi===lo ? 0 : (h-lo)/(hi-lo);
  const a=TIME_PRESETS[lo], b=TIME_PRESETS[hi];
  return { sun:lerpColor(a.sun,b.sun,t), sky:lerpColor(a.sky,b.sky,t),
           ambient:lerpColor(a.ambient,b.ambient,t), fog:lerpColor(a.fog,b.fog,t),
           exp:a.exp+(b.exp-a.exp)*t };
}
function setTimeOfDay(h) {
  timeOfDay = parseInt(h);
  updateSunPosition(timeOfDay);
  updateWindowLighting();
  updateStreetLights();
}
function updateSunPosition(h) {
  const p = getTimePreset(h);
  const angle = ((h - 5) / 18) * Math.PI;
  const isDay = h >= 6 && h <= 20;
  sunLight.position.set(Math.cos(angle)*100, Math.sin(angle)*80 + 5, 50);
  sunLight.color.setHex(p.sun);
  sunLight.intensity = isDay ? 1.1 : 0.08;
  ambientLight.color.setHex(p.ambient);
  ambientLight.intensity = isDay ? 0.6 : 0.28;
  scene.fog.color.setHex(p.fog);
  scene.background = new THREE.Color(p.sky);
  renderer.toneMappingExposure = p.exp;
}
function updateWindowLighting() {
  const isNight = timeOfDay >= 20 || timeOfDay <= 5;
  const isDusk  = timeOfDay >= 17 && timeOfDay < 20;
  const intensity = isNight ? 1.0 : isDusk ? 0.5 : 0.05;
  buildingGroups.forEach(g => { if (g.userData.winMat) g.userData.winMat.emissiveIntensity = intensity; });
}
function updateStreetLights() {
  const on = timeOfDay >= 18 || timeOfDay <= 7; // wider night window
  streetLights.forEach(sl => {
    sl.light.intensity = on ? 1.8 : 0;
    sl.bulb.material.emissiveIntensity = on ? 1.2 : 0;
    // Also make bulb visible colour shift
    sl.bulb.material.color.setHex(on ? 0xFFEE88 : 0x888888);
  });
}
// Night mode — triggered by question answer, forces lights on immediately
function forceNightLights() {
  streetLights.forEach(sl => {
    sl.light.intensity = 1.8;
    sl.bulb.material.emissiveIntensity = 1.2;
    sl.bulb.material.color.setHex(0xFFEE88);
  });
}

// ════════════════════════════════════════
//  WINDOW TEXTURE
// ════════════════════════════════════════
function makeWindowTexture(litFraction) {
  const c = document.createElement('canvas');
  c.width=128; c.height=256;
  const ctx = c.getContext('2d');
  ctx.fillStyle = '#1a1f2e';
  ctx.fillRect(0,0,128,256);
  const cols=6, rows=14, ww=13, wh=14, gx=5, gy=5;
  for (let r=0;r<rows;r++) for (let col=0;col<cols;col++) {
    const lit = Math.random() < litFraction;
    ctx.fillStyle = lit ? `rgba(255,215,100,${0.7+Math.random()*0.3})` : 'rgba(20,30,50,0.9)';
    ctx.fillRect(gx+col*(ww+gx), gy+r*(wh+gy), ww, wh);
  }
  return new THREE.CanvasTexture(c);
}

// ════════════════════════════════════════
//  GROUND — FULLY TERRAIN-AWARE
//  plains → flat grass + city roads across whole area
//  beach  → sand front half, animated ocean back half, NO city roads
//  mountain → rocky hillside terrain, NO city roads
// ════════════════════════════════════════
let waterMesh = null; // tracked for animation

function buildGround(terrain) {
  const GSIZE = 260;

  if (terrain === 'plains') {
    // ── PLAINS: grass + full road grid ──
    const gc = document.createElement('canvas'); gc.width=512; gc.height=512;
    const gctx = gc.getContext('2d');
    gctx.fillStyle = '#4a6741';
    gctx.fillRect(0,0,512,512);
    for (let i=0;i<3000;i++) { gctx.fillStyle=`rgba(0,0,0,${Math.random()*0.05})`; gctx.fillRect(Math.random()*512,Math.random()*512,2,2); }
    const gTex = new THREE.CanvasTexture(gc);
    gTex.wrapS=gTex.wrapT=THREE.RepeatWrapping; gTex.repeat.set(4,4);
    const ground = new THREE.Mesh(new THREE.PlaneGeometry(GSIZE,GSIZE), new THREE.MeshLambertMaterial({map:gTex}));
    ground.rotation.x=-Math.PI/2; ground.receiveShadow=true; scene.add(ground);
    buildCityRoads(GSIZE);

  } else if (terrain === 'beach') {
    // ── BEACH layout (Z axis): 
    //   z = +130 to +40  → tropical green jungle/settlement zone
    //   z = +40  to -20  → sandy beach strip
    //   z = -20  to -160 → ocean (always blue)
    // ──────────────────────────────────────

    // JUNGLE / GREEN zone — where houses and palms live
    const jungleMat = new THREE.MeshLambertMaterial({color:0x2e7a28});
    const jungle = new THREE.Mesh(new THREE.PlaneGeometry(GSIZE, 120), jungleMat);
    jungle.rotation.x=-Math.PI/2; jungle.position.set(0,0,85); jungle.receiveShadow=true; scene.add(jungle);

    // Darker undergrowth patches for variety
    for (let i=0;i<14;i++) {
      const pm=new THREE.MeshLambertMaterial({color:[0x256820,0x347a2a,0x1e5e18,0x3d8a32][i%4]});
      const pw=25+Math.random()*35, pd=20+Math.random()*30;
      const pp=new THREE.Mesh(new THREE.PlaneGeometry(pw,pd),pm);
      pp.rotation.x=-Math.PI/2;
      pp.position.set((Math.random()-0.5)*200,0.03,40+Math.random()*90);
      scene.add(pp);
    }

    // SAND strip — narrow, only between green and ocean
    const sandMat = new THREE.MeshLambertMaterial({color:0xe8d49a});
    const sand = new THREE.Mesh(new THREE.PlaneGeometry(GSIZE, 65), sandMat);
    sand.rotation.x=-Math.PI/2; sand.position.set(0,0.01,-5); sand.receiveShadow=true; scene.add(sand);

    // OCEAN — always vivid blue regardless of time (MeshBasicMaterial ignores lighting)
    const oceanMat = new THREE.MeshBasicMaterial({color:0x1a8fcc});
    waterMesh = new THREE.Mesh(new THREE.PlaneGeometry(GSIZE, 150), oceanMat);
    waterMesh.rotation.x=-Math.PI/2; waterMesh.position.set(0,-0.2,-90);
    scene.add(waterMesh);

    // Deeper ocean behind (darker blue)
    const deepMat = new THREE.MeshBasicMaterial({color:0x0d5a8a});
    const deep = new THREE.Mesh(new THREE.PlaneGeometry(GSIZE, 80), deepMat);
    deep.rotation.x=-Math.PI/2; deep.position.set(0,-0.3,-175); scene.add(deep);

    // Wave lines — multiple white foam strips at different z positions
    const waveMat = new THREE.MeshBasicMaterial({color:0xddeeff, transparent:true, opacity:0.6});
    [-38,-48,-60,-74].forEach((wz,wi) => {
      const wave = new THREE.Mesh(new THREE.PlaneGeometry(GSIZE, 2.5+wi*0.5), waveMat.clone());
      wave.rotation.x=-Math.PI/2; wave.position.set(0,0.05+wi*0.01,wz);
      wave.userData.isWave=true; wave.userData.waveIndex=wi;
      scene.add(wave);
    });

    // Shore foam
    const foamMat = new THREE.MeshBasicMaterial({color:0xf0f8ff, transparent:true, opacity:0.7});
    const foam = new THREE.Mesh(new THREE.PlaneGeometry(GSIZE, 6), foamMat);
    foam.rotation.x=-Math.PI/2; foam.position.set(0,0.08,-22); scene.add(foam);

    buildBeachPaths();
    scene.fog.color.setHex(0x9ad4e8);
    scene.fog.density = 0.006;

  } else if (terrain === 'mountain') {
    // ── MOUNTAIN: rich green alpine valley ──
    // Warm green base — NO grey
    const groundMat = new THREE.MeshLambertMaterial({color:0x3e6e34});
    const ground = new THREE.Mesh(new THREE.PlaneGeometry(GSIZE,GSIZE), groundMat);
    ground.rotation.x=-Math.PI/2; ground.receiveShadow=true; scene.add(ground);

    // Dense overlapping green patches — cover 100% of visible ground
    const greenCols = [0x2d5e26,0x3d7030,0x4a8040,0x558848,0x336028,0x487038,0x5a9050,0x3a6830];
    for (let i=0; i<45; i++) {
      const pw=50+Math.random()*80, pd=40+Math.random()*70;
      const gp=new THREE.Mesh(new THREE.PlaneGeometry(pw,pd),
        new THREE.MeshLambertMaterial({color:greenCols[i%greenCols.length]}));
      gp.rotation.x=-Math.PI/2;
      gp.position.set((Math.random()-0.5)*260, 0.04+i*0.001, (Math.random()-0.5)*220);
      scene.add(gp);
    }

    // Mountain ridges — warm brown/green rocky colours, NOT cold grey
    const mtnCols = [
      [0x7a6e5a,0x8a7e6a,0x6a6050], // front row warm brown
      [0x5e6858,0x506050,0x687868], // mid row green-grey
      [0x5a6860,0x4a5850,0x6a7868], // back row deeper
    ];
    const mtnRows = [
      { z:-75,  count:7, hMin:10, hMax:20, rMin:7,  rMax:13 },
      { z:-108, count:8, hMin:20, hMax:36, rMin:11, rMax:19 },
      { z:-142, count:9, hMin:32, hMax:52, rMin:14, rMax:24 },
    ];
    mtnRows.forEach((row,ri) => {
      for (let i=0;i<row.count;i++) {
        const mh=row.hMin+Math.random()*(row.hMax-row.hMin);
        const mr=row.rMin+Math.random()*(row.rMax-row.rMin);
        const mx=-130+i*(260/(row.count-1))+(Math.random()-0.5)*14;
        const mz=row.z+(Math.random()-0.5)*14;
        const col=mtnCols[ri][i%mtnCols[ri].length];
        const cone=new THREE.Mesh(new THREE.ConeGeometry(mr,mh,7),
          new THREE.MeshLambertMaterial({color:col}));
        cone.position.set(mx,mh/2-1,mz); cone.castShadow=true; scene.add(cone);
        // Grassy lower skirt on mountains
        const skirt=new THREE.Mesh(new THREE.ConeGeometry(mr*1.3,mh*0.2,7),
          new THREE.MeshLambertMaterial({color:0x3d6830}));
        skirt.position.set(mx,mh*0.1-1,mz); scene.add(skirt);
        // Snow caps on back row tall peaks
        if (ri===2 && mh>40) {
          const snow=new THREE.Mesh(new THREE.ConeGeometry(mr*0.3,mh*0.16,6),
            new THREE.MeshLambertMaterial({color:0xeeeeff}));
          snow.position.set(mx,mh-3,mz); scene.add(snow);
        }
      }
    });

    // Rocks spread ACROSS THE WHOLE ground area (not just centre)
    for (let i=0; i<28; i++) {
      const rh=1.5+Math.random()*4, rr=1.2+Math.random()*2.8;
      // warm grey-brown rocks, not cold grey
      const rockCol=[0x8a7a60,0x7a6e58,0x6a6050,0x907860,0x786850][i%5];
      const rock=new THREE.Mesh(new THREE.ConeGeometry(rr,rh,5),
        new THREE.MeshLambertMaterial({color:rockCol}));
      // Spread across whole GSIZE area
      rock.position.set((Math.random()-0.5)*220, rh/2, (Math.random()-0.5)*180);
      rock.rotation.y=Math.random()*Math.PI; rock.rotation.z=(Math.random()-0.5)*0.3;
      rock.castShadow=true; scene.add(rock);
    }

    buildMountainPaths();
    scene.fog.density=0.008;
    scene.fog.color.setHex(0x6a8868);
  }
}

// ── PLAINS city road grid (only used for plains terrain) ──
function buildCityRoads(GSIZE) {
  const asphaltMat  = new THREE.MeshLambertMaterial({color:0x2a2a2a});
  const sidewalkMat = new THREE.MeshLambertMaterial({color:0x3e3e3e});
  ROAD_POS.forEach(rx => {
    const sw = new THREE.Mesh(new THREE.PlaneGeometry(ROAD_SAFE*2+2,GSIZE), sidewalkMat);
    sw.rotation.x=-Math.PI/2; sw.position.set(rx,0.04,0); sw.receiveShadow=true; scene.add(sw);
    const rd = new THREE.Mesh(new THREE.PlaneGeometry(ROAD_SAFE*2-2,GSIZE), asphaltMat);
    rd.rotation.x=-Math.PI/2; rd.position.set(rx,0.05,0); rd.receiveShadow=true; scene.add(rd);
  });
  ROAD_POS.forEach(rz => {
    const sw = new THREE.Mesh(new THREE.PlaneGeometry(GSIZE,ROAD_SAFE*2+2), sidewalkMat);
    sw.rotation.x=-Math.PI/2; sw.position.set(0,0.04,rz); sw.receiveShadow=true; scene.add(sw);
    const rd = new THREE.Mesh(new THREE.PlaneGeometry(GSIZE,ROAD_SAFE*2-2), asphaltMat);
    rd.rotation.x=-Math.PI/2; rd.position.set(0,0.05,rz); rd.receiveShadow=true; scene.add(rd);
  });
  // Yellow centre dashes
  const markMat = new THREE.MeshBasicMaterial({color:0xFFD700});
  const wMarkMat = new THREE.MeshBasicMaterial({color:0xffffff,opacity:0.5,transparent:true});
  const dashLen=5, dashGap=5;
  for (let d=0;d<Math.floor(GSIZE/(dashLen+dashGap));d++) {
    const pos=-GSIZE/2+d*(dashLen+dashGap)+dashLen/2;
    ROAD_POS.forEach(rx => {
      const m=new THREE.Mesh(new THREE.PlaneGeometry(0.4,dashLen),markMat);
      m.rotation.x=-Math.PI/2; m.position.set(rx,0.08,pos); scene.add(m);
    });
    ROAD_POS.forEach(rz => {
      const m=new THREE.Mesh(new THREE.PlaneGeometry(dashLen,0.4),markMat);
      m.rotation.x=-Math.PI/2; m.position.set(pos,0.08,rz); scene.add(m);
    });
  }
  // Crosswalks
  const cwMat = new THREE.MeshBasicMaterial({color:0xe8e5d8,opacity:0.7,transparent:true});
  ROAD_POS.forEach(rx => ROAD_POS.forEach(rz => {
    for(let s=0;s<5;s++){
      const so=(s-2)*2.2;
      [[new THREE.PlaneGeometry(ROAD_SAFE*2-2,0.9),rx,rz+ROAD_SAFE+2+so,0],
       [new THREE.PlaneGeometry(ROAD_SAFE*2-2,0.9),rx,rz-ROAD_SAFE-2+so,0],
       [new THREE.PlaneGeometry(0.9,ROAD_SAFE*2-2),rx+ROAD_SAFE+2+so,rz,0],
       [new THREE.PlaneGeometry(0.9,ROAD_SAFE*2-2),rx-ROAD_SAFE-2+so,rz,0]
      ].forEach(([g,x,z])=>{
        const m=new THREE.Mesh(g,cwMat);
        m.rotation.x=-Math.PI/2; m.position.set(x,0.09,z); scene.add(m);
      });
    }
  }));
}

// ── Beach sandy paths (narrow, organic, only in settlement zone) ──
function buildBeachPaths() {
  const pathMat = new THREE.MeshLambertMaterial({color:0xb8a870, transparent:true, opacity:0.7});
  // Two simple sandy paths through the beach settlement
  [[-20,0],[10,0]].forEach(([px]) => {

    p.rotation.x=-Math.PI/2; p.position.set(px, 0.03, 20); scene.add(p);

// ── Mountain winding paths (dirt trails, not city roads) ──
function buildMountainPaths() {
  const pathMat = new THREE.MeshLambertMaterial({color:0x8a7a5a, transparent:true, opacity:0.75});
  // Winding path segments through the settlement area
  const segs = [
    {x:-10,z:30,w:3,d:40},{x:15,z:10,w:40,d:3},
    {x:-25,z:5,w:3,d:30},{x:5,z:-15,w:30,d:3}
  ];
  segs.forEach(s=>{
    const m=new THREE.Mesh(new THREE.PlaneGeometry(s.w,s.d),pathMat);
    m.rotation.x=-Math.PI/2; m.position.set(s.x,0.04,s.z); scene.add(m);
  });
}

// ════════════════════════════════════════
//  HOUSE (beach / mountain) — solid BoxGeometry roof, no planes
// ════════════════════════════════════════
function spawnHouse(cfg, delay) {
  const {x, z, w, d, h} = cfg;
  const group = new THREE.Group();
  group.position.set(x, 0, z);

  const wallCols = [0xd4a882,0xc49a6c,0xe8c9a0,0xb8956a,0xd9b48a,0xa07850,0xc8b090,0xddc8a0];
  const roofCols = [0x8b3a2a,0x7a3020,0x9e5a3a,0xaa4428,0x6b4226,0x993322];
  const wallCol = wallCols[Math.floor(Math.random()*wallCols.length)];
  const roofCol = roofCols[Math.floor(Math.random()*roofCols.length)];

  // Walls — simple solid box
  const walls = new THREE.Mesh(new THREE.BoxGeometry(w,h,d),
    new THREE.MeshLambertMaterial({color:wallCol}));
  walls.position.y=h/2; walls.castShadow=true; walls.receiveShadow=true;
  group.add(walls);

  // Roof — solid wedge made from a scaled BoxGeometry
  // Pitched roof = a box that is tall in the centre, pointed on top
  // We fake this with a CylinderGeometry (radiusTop=0 = cone = pyramid shape)
  // Actually: use two box panels meeting at ridge — but simpler: a BoxGeometry scaled on Y
  // SIMPLEST RELIABLE approach: a box for the base of roof + a triangular prism (CylinderGeometry radialSegments=3, rotated)
  const roofH = h * 0.55;
  // Roof base slab
  const roofBase = new THREE.Mesh(new THREE.BoxGeometry(w+0.8, 0.3, d+0.8),
    new THREE.MeshLambertMaterial({color:roofCol}));
  roofBase.position.y = h+0.15; roofBase.castShadow=true; group.add(roofBase);
  // Triangular prism roof ridge — CylinderGeometry with 3 sides rotated 90deg
  const roofRidge = new THREE.Mesh(
    new THREE.CylinderGeometry(0, (d+1)*0.62, roofH, 3, 1),
    new THREE.MeshLambertMaterial({color:roofCol})
  );
  // rotate so the triangle points up along Z (ridge runs along X)
  roofRidge.rotation.y = Math.PI/6; // orient the triangle
  roofRidge.position.y = h + 0.3 + roofH/2;
  roofRidge.scale.x = (w+1)/((d+1)*1.07); // stretch to match house width
  roofRidge.castShadow=true; group.add(roofRidge);

  // Windows — small inset planes
  const winMat = new THREE.MeshBasicMaterial({color:0xFFE8A0, transparent:true, opacity:0.9});
  const ws = Math.min(w,d)*0.2;
  [-w*0.2,w*0.2].forEach(wx=>{
    const win=new THREE.Mesh(new THREE.PlaneGeometry(ws,ws*1.3),winMat);
    win.position.set(wx,h*0.58,d/2+0.06); group.add(win);
  });
  const swin=new THREE.Mesh(new THREE.PlaneGeometry(ws,ws*1.3),winMat);
  swin.position.set(w/2+0.06,h*0.58,0); swin.rotation.y=Math.PI/2; group.add(swin);

  // Door
  const door=new THREE.Mesh(new THREE.BoxGeometry(w*0.22,h*0.42,0.18),
    new THREE.MeshLambertMaterial({color:0x5a3010}));
  door.position.set(0,h*0.21,d/2+0.08); group.add(door);

  // Chimney (60% chance)
  if (Math.random()>0.4) {
    const chim=new THREE.Mesh(new THREE.BoxGeometry(w*0.15,roofH*0.85,d*0.15),
      new THREE.MeshLambertMaterial({color:0x7a5a40}));
    chim.position.set(w*0.22,h+roofH*0.5,0); chim.castShadow=true; group.add(chim);
    // chimney top cap
    const cap=new THREE.Mesh(new THREE.BoxGeometry(w*0.2,0.2,d*0.2),
      new THREE.MeshLambertMaterial({color:0x5a4030}));
    cap.position.set(w*0.22,h+roofH*0.9,0); group.add(cap);
  }

  // Step / porch
  const step=new THREE.Mesh(new THREE.BoxGeometry(w*0.4,0.28,0.9),
    new THREE.MeshLambertMaterial({color:0xc0a070}));
  step.position.set(0,0.14,d/2+0.5); group.add(step);

  group.userData.winMat=winMat;
  group.scale.set(1,0,1);
  scene.add(group); buildingGroups.push(group);
  gsap.to(group.scale,{y:1,duration:0.7,delay,ease:'back.out(1.4)'});
  return group;
}

// ════════════════════════════════════════
//  COCONUT PALM — proper wide drooping fronds
// ════════════════════════════════════════
function spawnPalm(x, z, delay) {
  const group = new THREE.Group();
  group.position.set(x, 0, z);

  // Curved trunk built from tapering cylinder segments
  const trunkMat = new THREE.MeshLambertMaterial({color:0x9B7A30});
  const trunkH = 9 + Math.random()*5;
  const lean = (Math.random()-0.5)*0.3;
  const segs = 6;
  for (let i=0;i<segs;i++) {
    const segH = trunkH/segs;
    const r = Math.max(0.08, 0.38 - i*0.05);
    const seg = new THREE.Mesh(new THREE.CylinderGeometry(r*0.82,r,segH+0.12,8), trunkMat);
    seg.position.set(lean*i*segH*0.6, i*segH+segH/2, 0);
    seg.rotation.z = lean*0.18;
    seg.castShadow=true; group.add(seg);
  }
  const topX = lean*(segs-1)*(trunkH/segs)*0.6;

  // Wide drooping fronds — each is a wide PlaneGeometry tilted DOWN from centre
  const frondMat = new THREE.MeshLambertMaterial({color:0x1e7a18, side:THREE.DoubleSide});
  const frondCount = 9;
  for (let i=0;i<frondCount;i++) {
    const angle = (i/frondCount)*Math.PI*2;
    const fLen = 3.8 + Math.random()*2.0;
    const fWid = 1.2 + Math.random()*0.6;
    const frond = new THREE.Mesh(new THREE.PlaneGeometry(fWid, fLen), frondMat);
    // Pivot from base of frond, droop outward and down
    const spread = 2.2;
    frond.position.set(
      topX + Math.sin(angle)*spread,
      trunkH + 0.6,
      Math.cos(angle)*spread
    );
    frond.rotation.y = -angle;
    frond.rotation.x = 1.1 + Math.random()*0.35; // droop DOWN strongly like coconut
    frond.castShadow=true; group.add(frond);
  }

  // Coconut cluster at crown
  const cMat = new THREE.MeshLambertMaterial({color:0x6a4010});
  for (let i=0;i<4;i++) {
    const cn = new THREE.Mesh(new THREE.SphereGeometry(0.28,7,7), cMat);
    cn.position.set(topX+(Math.random()-0.5)*0.9, trunkH+0.1, (Math.random()-0.5)*0.9);
    group.add(cn);
  }

  group.userData.swayOffset = Math.random()*Math.PI*2;
  group.userData.isPalm = true;
  group.scale.set(1,0,1);
  scene.add(group);
  treeMeshes.push(group);
  gsap.to(group.scale,{y:1,duration:0.8,delay,ease:'back.out(1.3)'});
}

  // Window skin
  const winTex = makeWindowTexture(0.25);
  const winMat = new THREE.MeshLambertMaterial({map:winTex, transparent:true, opacity:0.92,

  // Antenna on tall downtown towers

// ════════════════════════════════════════
//  CARS — travel along actual road lanes
// ════════════════════════════════════════
function spawnCars(count) {
  const colours = [0xcc2222,0x2255cc,0xdddddd,0x222222,0xffcc00,0xcc7700,0x22cc55];
  for (let i=0; i<count; i++) {
    const lane = CAR_LANES[i % CAR_LANES.length];
    const group = new THREE.Group();
    const col = colours[Math.floor(Math.random()*colours.length)];
    const mat = new THREE.MeshLambertMaterial({color:col});

    // Car body
    const body = new THREE.Mesh(new THREE.BoxGeometry(4,1.3,2.2), mat);
    body.position.y=0.8; body.castShadow=true; group.add(body);
    const cab = new THREE.Mesh(new THREE.BoxGeometry(2.2,0.9,2.0), mat);
    cab.position.set(0,1.75,0); group.add(cab);

    // Headlights (front) and taillights (rear)
    const hlMat = new THREE.MeshBasicMaterial({color:0xffffcc});
    const tlMat = new THREE.MeshBasicMaterial({color:0xff3300});
    [-0.8,0.8].forEach(zo => {
      const hl = new THREE.Mesh(new THREE.SphereGeometry(0.16,5,5), hlMat);
      hl.position.set(2.05,0.85,zo); group.add(hl);
      const tl = new THREE.Mesh(new THREE.SphereGeometry(0.13,5,5), tlMat);
      tl.position.set(-2.05,0.85,zo); group.add(tl);
    });

    // Wheels — correct orientation (roll along Z axis)
    const wMat = new THREE.MeshLambertMaterial({color:0x111111});
    const hubMat = new THREE.MeshLambertMaterial({color:0x888888});
    [[-1.4,0],[1.4,0]].forEach(([wx]) => {
      [-1.0,1.0].forEach(wzo => {
        const wh = new THREE.Mesh(new THREE.CylinderGeometry(0.42,0.42,0.28,10), wMat);
        wh.rotation.x = Math.PI/2; // rotate so wheel rolls forward/back
        wh.position.set(wx, 0.42, wzo); group.add(wh);
        // Hub cap
        const hub = new THREE.Mesh(new THREE.CylinderGeometry(0.18,0.18,0.3,6), hubMat);
        hub.rotation.x = Math.PI/2;
        hub.position.set(wx, 0.42, wzo + (wzo>0?0.15:-0.15));
        group.add(hub);
      });
    });

    // Set initial position and rotation based on lane
    if (lane.axis === 'x') {
      group.position.set(lane.from, 0.15, lane.fixed + lane.lane);
      group.rotation.y = lane.from < lane.to ? 0 : Math.PI;
    } else {
      group.position.set(lane.fixed + lane.lane, 0.15, lane.from);
      group.rotation.y = lane.from < lane.to ? -Math.PI/2 : Math.PI/2;
    }

    scene.add(group); carGroups.push(group);

    // Random start offset so cars aren't bunched
    const startOffset = Math.random();
    const duration = 10 + Math.random() * 8;

    function driveCar() {
      const targetX = lane.axis==='x' ? lane.to  : lane.fixed + lane.lane;
      const targetZ = lane.axis==='z' ? lane.to  : lane.fixed + lane.lane;
      gsap.to(group.position, {
        x: targetX, z: targetZ, duration,
        ease:"none",
        onComplete: () => {
          // Teleport back to start
          if (lane.axis==='x') group.position.set(lane.from, 0.15, lane.fixed+lane.lane);
          else group.position.set(lane.fixed+lane.lane, 0.15, lane.from);
          driveCar();
        }
      });
    }
    gsap.delayedCall(startOffset * duration, driveCar);
  }
}

//  MUSIC
// ════════════════════════════════════════
function initAudio() { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
function startMusic() {
  if (!audioCtx) initAudio();
  if (audioCtx.state==='suspended') audioCtx.resume();
  stopMusic();
  const master = audioCtx.createGain();
  master.gain.setValueAtTime(0, audioCtx.currentTime);
  master.gain.linearRampToValueAtTime(0.42, audioCtx.currentTime+2.5);
  master.connect(audioCtx.destination);
  musicNodes=[master];
  const isHustle = answers.vibe === 'hustle';
  // Ambient chord pad — Cmaj7
  [130.81,164.81,196.00,246.94,329.63].forEach((f,i) => {
    const o=audioCtx.createOscillator(), g=audioCtx.createGain();
    o.type='sine'; o.frequency.value=f; g.gain.value=0.055-i*0.007;
    o.connect(g); g.connect(master); o.start(); musicNodes.push(o,g);
  });
  // Sub bass
  const bass=audioCtx.createOscillator(), bg=audioCtx.createGain();
  bass.type='sine'; bass.frequency.value=isHustle?65:45; bg.gain.value=0.045;
  bass.connect(bg); bg.connect(master); bass.start(); musicNodes.push(bass,bg);
  // Hi-hat rhythm
  function hat() {
    if (!musicPlaying) return;
    const bpm=isHustle?118:76, interval=60/bpm/2;
    const buf=audioCtx.createBuffer(1,Math.floor(audioCtx.sampleRate*0.055),audioCtx.sampleRate);
    const d=buf.getChannelData(0);
    for(let i=0;i<d.length;i++) d[i]=(Math.random()*2-1)*Math.pow(1-i/d.length,3.5)*0.28;
    const s=audioCtx.createBufferSource(), hg=audioCtx.createGain();
    hg.gain.value=0.055; s.buffer=buf; s.connect(hg); hg.connect(master); s.start();
    setTimeout(hat, interval*1000);
  }
  setTimeout(hat,600);
}
function stopMusic() { musicNodes.forEach(n=>{try{n.stop?n.stop():n.disconnect();}catch(e){}}); musicNodes=[]; }
function toggleMusic() {
  musicPlaying=!musicPlaying;
  const btn=document.getElementById('music-btn');
  if (musicPlaying){startTerrainMusic(answers.terrain||'plains',answers.vibe||'chill');btn.classList.add('playing');btn.textContent='♫';}
  else{stopMusic();btn.classList.remove('playing');btn.textContent='♪';}
}

//  EXPLORE MODE STATE
// ════════════════════════════════════════
let exploreMode = false;
const explorePos   = new THREE.Vector3(0, 2.2, 30);
const exploreYaw   = { val: 0 };   // horizontal look (radians)
const explorePitch = { val: -0.08 }; // vertical look
const keys = { w:false, a:false, s:false, d:false, shift:false };
let pointerLocked = false;
// Mobile joystick state
const joyDelta = { x:0, y:0 };
let joyActive = false, joyStartX=0, joyStartY=0;
let lookActive=false, lookStartX=0, lookStartY=0;

function enterExploreMode() {
  exploreMode = true;
  autoRotate = false;
  document.getElementById('auto-rotate-btn').classList.remove('active');
  document.getElementById('hud').classList.remove('visible');
  document.getElementById('time-control').classList.remove('visible');
  document.getElementById('compass').classList.remove('visible');
  document.getElementById('explore-hud').classList.add('show');
  document.getElementById('exit-explore').classList.add('show');
  document.getElementById('crosshair').classList.add('show');
  document.getElementById('explore-btn').classList.add('active');

  // Set start position above ground looking into city
  explorePos.set(0, 2.2, 80);
  exploreYaw.val   = Math.PI;  // face toward city centre
  explorePitch.val = -0.08;

  // Mobile: show joystick + look pad
  if ('ontouchstart' in window) {
    document.getElementById('joystick-zone').classList.add('show');
    document.getElementById('look-zone').classList.add('show');
    document.getElementById('explore-hud').classList.remove('show'); // hide kb hint on mobile
  } else {
    // Desktop: request pointer lock for smooth mouse look
    renderer.domElement.requestPointerLock();
  }
}

function exitExploreMode() {
  exploreMode = false;
  if (document.pointerLockElement) document.exitPointerLock();
  pointerLocked = false;
  document.getElementById('explore-hud').classList.remove('show');
  document.getElementById('exit-explore').classList.remove('show');
  document.getElementById('crosshair').classList.remove('show');
  document.getElementById('explore-btn').classList.remove('active');
  document.getElementById('joystick-zone').classList.remove('show');
  document.getElementById('look-zone').classList.remove('show');
  document.getElementById('hud').classList.add('visible');
  document.getElementById('time-control').classList.add('visible');
  document.getElementById('compass').classList.add('visible');
  // Reset to orbit view
  orbit.targetRadius = 120; orbit.targetPhi = 1.0; orbit.theta = exploreYaw.val;
}

// Pointer lock handlers
document.addEventListener('pointerlockchange', () => {
  pointerLocked = !!document.pointerLockElement;
});
document.addEventListener('mousemove', e => {
  if (!exploreMode || !pointerLocked) return;
  exploreYaw.val   -= e.movementX * 0.002;
  explorePitch.val  = Math.max(-0.9, Math.min(0.5, explorePitch.val - e.movementY * 0.002));
});
// Click to re-lock pointer if lost (registered after renderer init)
function registerClickLock() {
  renderer.domElement.addEventListener('click', () => {
    if (exploreMode && !pointerLocked) renderer.domElement.requestPointerLock();
  });
}

// Keyboard
window.addEventListener('keydown', e => {
  if (e.key==='w'||e.key==='W'||e.key==='ArrowUp')    keys.w=true;
  if (e.key==='a'||e.key==='A'||e.key==='ArrowLeft')  keys.a=true;
  if (e.key==='s'||e.key==='S'||e.key==='ArrowDown')  keys.s=true;
  if (e.key==='d'||e.key==='D'||e.key==='ArrowRight') keys.d=true;
  if (e.key==='Shift') keys.shift=true;
  if (e.key==='Escape' && exploreMode) exitExploreMode();
  // E key = talk to nearest person (works in both explore and orbit mode)
  if ((e.key==='e'||e.key==='E') && cityBuilt && people.length) {
    talkToNearest();
  }
});
window.addEventListener('keyup', e => {
  if (e.key==='w'||e.key==='W'||e.key==='ArrowUp')    keys.w=false;
  if (e.key==='a'||e.key==='A'||e.key==='ArrowLeft')  keys.a=false;
  if (e.key==='s'||e.key==='S'||e.key==='ArrowDown')  keys.s=false;
  if (e.key==='d'||e.key==='D'||e.key==='ArrowRight') keys.d=false;
  if (e.key==='Shift') keys.shift=false;
});

// Mobile joystick
function initMobileExplore() {
  const jZone  = document.getElementById('joystick-zone');
  const knob   = document.getElementById('joystick-knob');
  const lZone  = document.getElementById('look-zone');

  jZone.addEventListener('touchstart', e => {
    e.preventDefault(); joyActive=true;
    joyStartX=e.touches[0].clientX; joyStartY=e.touches[0].clientY;
  },{passive:false});
  jZone.addEventListener('touchmove', e => {
    e.preventDefault();
    if (!joyActive) return;
    const dx=e.touches[0].clientX-joyStartX, dy=e.touches[0].clientY-joyStartY;
    const len=Math.min(30,Math.hypot(dx,dy));
    const ang=Math.atan2(dy,dx);
    joyDelta.x = Math.cos(ang)*len/30;
    joyDelta.y = Math.sin(ang)*len/30;
    knob.style.left=(24+Math.cos(ang)*len*0.6)+'px';
    knob.style.top =(24+Math.sin(ang)*len*0.6)+'px';
  },{passive:false});
  jZone.addEventListener('touchend', e => {
    joyActive=false; joyDelta.x=0; joyDelta.y=0;
    knob.style.left='24px'; knob.style.top='24px';
  },{passive:false});

  lZone.addEventListener('touchstart', e => {
    e.preventDefault(); lookActive=true;
    lookStartX=e.touches[0].clientX; lookStartY=e.touches[0].clientY;
  },{passive:false});
  lZone.addEventListener('touchmove', e => {
    e.preventDefault();
    if (!lookActive) return;
    const dx=e.touches[0].clientX-lookStartX, dy=e.touches[0].clientY-lookStartY;
    exploreYaw.val   -= dx*0.004;
    explorePitch.val  = Math.max(-0.9,Math.min(0.5,explorePitch.val-dy*0.004));
    lookStartX=e.touches[0].clientX; lookStartY=e.touches[0].clientY;
  },{passive:false});
  lZone.addEventListener('touchend', ()=>{ lookActive=false; },{passive:false});
}
initMobileExplore();

function checkNearbyPeople() {
  if (!cityBuilt || !people.length) return;
  const camPos = camera.position;
  let nearest = null, nearestDist = Infinity;
  people.forEach(p => {
    if (!p.visible) return;
    const dx=p.position.x-camPos.x, dz=p.position.z-camPos.z;
    const d=Math.sqrt(dx*dx+dz*dz);
    if (d<nearestDist) { nearestDist=d; nearest=p; }
  });
  const hint = document.getElementById('talk-hint');
  const mTalkBtn = document.getElementById('mobile-talk-btn');
  if (nearest && nearestDist < 12) {
    hint.style.display='block';
    hint.style.left='50%'; hint.style.top='42%';
    hint.style.transform='translateX(-50%)';
    hint.textContent=(window._isMobile?'Tap Talk button':'Press E')+' to talk to '+nearest.userData.name;
    if (window._isMobile && mTalkBtn) mTalkBtn.classList.add('show');
  } else if (exploreMode) {
    hint.style.display='none';
    if (mTalkBtn) mTalkBtn.classList.remove('show');
  }
}

function updateExploreCamera(dt) {
  const speed = (keys.shift || (joyActive && joyDelta.y<-0.7)) ? 18 : 7;
  const dir = new THREE.Vector3();

  // Forward vector from yaw
  const fwd = new THREE.Vector3(-Math.sin(exploreYaw.val), 0, -Math.cos(exploreYaw.val));
  const right = new THREE.Vector3(Math.cos(exploreYaw.val), 0, -Math.sin(exploreYaw.val));

  // Keyboard
  if (keys.w) dir.addScaledVector(fwd,   1);
  if (keys.s) dir.addScaledVector(fwd,  -1);
  if (keys.a) dir.addScaledVector(right,-1);
  if (keys.d) dir.addScaledVector(right, 1);

  // Mobile joystick
  if (joyActive) {
    dir.addScaledVector(fwd,  -joyDelta.y);
    dir.addScaledVector(right, joyDelta.x);
  }

  if (dir.lengthSq() > 0) { dir.normalize(); explorePos.addScaledVector(dir, speed*dt); }

  // Clamp to city bounds
  explorePos.x = Math.max(-110,Math.min(110,explorePos.x));
  explorePos.z = Math.max(-110,Math.min(110,explorePos.z));
  explorePos.y = 2.2; // fixed eye height

  // Apply to camera
  camera.position.copy(explorePos);
  const lookDir = new THREE.Vector3(
    Math.sin(exploreYaw.val)*Math.cos(explorePitch.val),
    Math.sin(explorePitch.val),
    Math.cos(exploreYaw.val)*Math.cos(explorePitch.val)
  );
  // negate because of Three.js coordinate system
  camera.lookAt(explorePos.clone().add(new THREE.Vector3(
    -Math.sin(exploreYaw.val)*Math.cos(explorePitch.val),
    Math.sin(explorePitch.val),
    -Math.cos(exploreYaw.val)*Math.cos(explorePitch.val)
  )));
}

// ════════════════════════════════════════
//  ANIMATE LOOP
// ════════════════════════════════════════
let lastTime = 0;
function animate(now) {
  requestAnimationFrame(animate);
  const dt = Math.min((now - lastTime)/1000, 0.1); lastTime = now;
  const t = clock.getElapsedTime();

  if (exploreMode) {
    updateExploreCamera(dt);
    checkNearbyPeople();
  } else {
    updateCamera();
  }

  // Tree sway
  treeMeshes.forEach(tree => {
    if (tree.userData.isPalm) {
      tree.rotation.z = Math.sin(t*0.6+tree.userData.swayOffset)*0.06;
      tree.rotation.x = Math.cos(t*0.5+tree.userData.swayOffset)*0.03;
    } else {
      tree.rotation.z = Math.sin(t*0.75+tree.userData.swayOffset)*0.022;
    }
  });

  // Ocean — static blue plane, waves animated separately
  if (waterMesh) {
    // Gentle bob
    waterMesh.position.y = -0.2 + Math.sin(t*0.5)*0.08;
  }
  // Animate wave strips — each wave pulses opacity and moves slightly
  scene.traverse(obj => {
    if (obj.userData.isWave) {
      const wi = obj.userData.waveIndex;
      obj.material.opacity = 0.3 + Math.abs(Math.sin(t*0.9 + wi*1.2))*0.55;
      obj.position.z += Math.sin(t*0.7 + wi)*0.008;
      // Reset drift
      if (obj.position.z > -30 + wi*2) obj.position.z = -40 + wi*2;
    }
  });

  // People
  animatePeople(t);
  // Birds
  animateBirds(t, dt);
  // Sync 3D sun with time slider
  if (cityBuilt && sunMesh) updateSun3D(timeOfDay);

  // Blinkers
  scene.traverse(obj => {
    if (obj.userData.isBlinker) obj.visible = Math.sin(t*1.8+obj.userData.blinkOffset)>0.2;
  });

  renderer.render(scene, camera);
}

function buildProgressBar() {
  const el=document.getElementById('q-progress'); el.innerHTML='';
  questions.forEach((_,i)=>{
    const d=document.createElement('div');
    d.className='q-dot'+(i<currentQ?' done':i===currentQ?' active':'');
    el.appendChild(d);
  });
}
function showQuestion(idx) {
  if (idx>=questions.length){finishQuestions();return;}
  const q=questions[idx];
  document.getElementById('q-label').textContent=q.label;
  const optEl=document.getElementById('q-options'); optEl.innerHTML='';
  q.opts.forEach(opt=>{
    const btn=document.createElement('button'); btn.className='q-opt';
    btn.textContent=opt.label;
    btn.onclick=()=>selectOption(q.key,opt.val,btn);
    optEl.appendChild(btn);
  });
  buildProgressBar();
}
function selectOption(key, val, btn) {
  document.querySelectorAll('.q-opt').forEach(b=>b.classList.remove('selected'));
  btn.classList.add('selected');
  answers[key]=val;
  reactToAnswer(key, val, currentQ);
  setTimeout(()=>{ currentQ++; if(currentQ<questions.length)showQuestion(currentQ); else finishQuestions(); }, 650);
}

function reactToAnswer(key, val, qIdx) {
  const terrain = answers.terrain || 'plains';
  const isMountain = terrain === 'mountain';
  const isBeach    = terrain === 'beach';
  const isNatural  = isMountain || isBeach; // no city towers

  if (qIdx===0) {
    showNotice("Setting terrain...");
    buildGround(val);
  }
  else if (qIdx===1) {
    const isBig = val==='big';
    if (isNatural) {
      showNotice(isMountain ? "Mountain village forming..." : "Beach village rising...");

      if (isBeach) {
        // BEACH houses: fill the ENTIRE jungle/green zone evenly
        // Green zone: x = ±110, z = +25 to +120
        // Use a grid of cells across this zone so houses fill every part
        const cols = isBig ? 7 : 5;
        const rows = isBig ? 5 : 3;
        const totalHouses = cols * rows;
        const xStart=-100, xEnd=100, zStart=28, zEnd=115;
        const xStep=(xEnd-xStart)/cols, zStep=(zEnd-zStart)/rows;
        for (let r=0;r<rows;r++) {
          for (let c=0;c<cols;c++) {
            const i = r*cols+c;
            // Skip ~20% randomly for natural look
            if (Math.random()<0.2) continue;
            const hx = xStart + c*xStep + xStep/2 + (Math.random()-0.5)*xStep*0.65;
            const hz = zStart + r*zStep + zStep/2 + (Math.random()-0.5)*zStep*0.65;
            const hw=5+Math.random()*4, hd=5+Math.random()*4, hh=4+Math.random()*3;
            spawnHouse({x:hx, z:hz, w:hw, d:hd, h:hh}, i*0.04);
          }
        }
      } else {
        // MOUNTAIN houses: fill the ENTIRE safe valley (z=-65 to +60, x=-110 to +110)
        // Mountains are at z < -70, so houses go in z > -65 (safe ground)
        const cols = isBig ? 9 : 6;
        const rows = isBig ? 6 : 4;
        const xStart=-115, xEnd=115, zStart=-68, zEnd=62;
        const xStep=(xEnd-xStart)/cols, zStep=(zEnd-zStart)/rows;
        for (let r=0;r<rows;r++) {
          for (let c=0;c<cols;c++) {
            const i = r*cols+c;
            if (Math.random()<0.22) continue; // natural gaps
            const hx = xStart + c*xStep + xStep/2 + (Math.random()-0.5)*xStep*0.6;
            const hz = zStart + r*zStep + zStep/2 + (Math.random()-0.5)*zStep*0.6;
            const hw=5+Math.random()*4, hd=5+Math.random()*4, hh=4+Math.random()*3;
            spawnHouse({x:hx, z:hz, w:hw, d:hd, h:hh}, i*0.04);
          }
        }
      }

    } else {
      // PLAINS: city buildings — fill ALL 16 blocks with dense coverage
      showNotice(isBig?"City skyline rising...":"Small town forming...");
      // Use block centres: -85,-30,30,85 on both axes (4x4 = 16 blocks)
      // Each block gets multiple buildings — fill the whole city area
      const blockCentres = [-85,-30,30,85];
      const bldPerBlock = isBig ? 6 : 3;
      let idx=0;
      blockCentres.forEach(bx => {
        blockCentres.forEach(bz => {
          const isCenter = Math.abs(bx)<=35 && Math.abs(bz)<=35;
          for (let b=0;b<bldPerBlock;b++) {
            // Spread within block (block is ~22 wide, roads at ±9 from each road centre)
            const ox=(Math.random()-0.5)*18, oz=(Math.random()-0.5)*18;
            const x=bx+ox, z=bz+oz;
            if (onRoad(x,z)) continue;
            const isDowntown = isBig && isCenter;
            const h = isDowntown?20+Math.random()*48:isBig?6+Math.random()*20:4+Math.random()*12;
            const w = isDowntown?5+Math.random()*7:4+Math.random()*6;
            const d = isDowntown?5+Math.random()*7:4+Math.random()*6;
            spawnBuilding({x,z,w,d,h,isDowntown}, idx*0.025);
            idx++;
          }
        });
      });
    }
  }
  else if (qIdx===2) {
    if (val==='high' || isNatural) {
      showNotice(isBeach?"Palm trees swaying...":isMountain?"Pine forest growing...":"Planting parks...");
      if (isBeach) {
        // BEACH: palms fill the ENTIRE jungle zone with a grid + random offset
        // Jungle zone: x=±110, z=+22 to +125
        const palmCols=8, palmRows=5;
        const pxS=-105,pxE=105,pzS=22,pzE=122;
        const pxStep=(pxE-pxS)/palmCols, pzStep=(pzE-pzS)/palmRows;
        let pi=0;
        for(let r=0;r<palmRows;r++) for(let c=0;c<palmCols;c++){
          if(Math.random()<0.15) continue;
          const px=pxS+c*pxStep+pxStep/2+(Math.random()-0.5)*pxStep*0.7;
          const pz=pzS+r*pzStep+pzStep/2+(Math.random()-0.5)*pzStep*0.7;
          spawnPalm(px,pz,pi*0.03); pi++;
        }
        // Extra palms near the shore line for tropical density
        for(let i=0;i<15;i++) spawnPalm((Math.random()-0.5)*180, 22+Math.random()*30, i*0.04);
        // Regular trees (banana/tropical) filling deeper jungle
        if(val==='high') for(let i=0;i<30;i++) spawnTree((Math.random()-0.5)*190,55+Math.random()*70,i*0.04);
        // Beach huts on sand
        for(let i=0;i<6;i++) spawnBeachHut((Math.random()-0.5)*150,-10+Math.random()*28,i*0.07);
        // Beach props scattered on sand
        for(let i=0;i<14;i++) spawnBeachProp((Math.random()-0.5)*160,-15+Math.random()*30,i*0.05);

      } else if (isMountain) {
        // MOUNTAIN: trees fill the ENTIRE valley floor (z=-65 to +60, x=±110)
        // Use a grid to guarantee coverage everywhere
        const tCols=10, tRows=7;
        const txS=-115,txE=115,tzS=-68,tzE=62;
        const txStep=(txE-txS)/tCols,tzStep=(tzE-tzS)/tRows;
        let ti=0;
        for(let r=0;r<tRows;r++) for(let c=0;c<tCols;c++){
          if(Math.random()<0.2) continue; // natural gaps
          const tx=txS+c*txStep+txStep/2+(Math.random()-0.5)*txStep*0.75;
          const tz=tzS+r*tzStep+tzStep/2+(Math.random()-0.5)*tzStep*0.75;
          spawnTree(tx,tz,ti*0.025); ti++;
        }
        // Dense forest along edges and behind village
        if(val==='high') for(let i=0;i<25;i++) spawnTree((Math.random()-0.5)*200,-30+Math.random()*90,i*0.04);

      } else {
        // PLAINS: trees fill the ENTIRE visible green area using a grid
        // Grid covers x=±110, z=±110 — skip road zones
        const tCols=10, tRows=10;
        const txS=-108,txE=108,tzS=-108,tzE=108;
        const txStep=(txE-txS)/tCols,tzStep=(tzE-tzS)/tRows;
        let placed=0;
        for(let r=0;r<tRows;r++) for(let c=0;c<tCols;c++){
          if(Math.random()<0.35) continue;
          const tx=txS+c*txStep+txStep/2+(Math.random()-0.5)*txStep*0.7;
          const tz=tzS+r*tzStep+tzStep/2+(Math.random()-0.5)*tzStep*0.7;
          if(onRoad(tx,tz)) continue;
          spawnTree(tx,tz,placed*0.025); placed++;
        }
      }
    } else {
      showNotice("Paving roads...");
    }
  }
  else if (qIdx===3) {
    const tMap={morning:7,golden:18,night:22};
    const h=tMap[val]||14; timeOfDay=h;
    document.getElementById('time-slider').value=h;
    showNotice(val==='night'?"Night falls over the city...":val==='golden'?"Golden hour lighting!":"Morning sun rising...");
    updateSunPosition(h); updateWindowLighting(); updateStreetLights();
    if (val==='night') { setTimeout(()=>{ forceNightLights(); applyNightSky(); }, 300); }
    else { applyDaySky(h); }
  }
  else if (qIdx===4) {
    if (isNatural) {
      // Beach/mountain: boats or no vehicles, just lights
      showNotice(isBeach?"Waves rolling in...":isMountain?"Lanterns lighting up...":"Village settling...");
      // Lights in green/jungle zone for beach, spread around village for mountain
      const naturalLights = [];
      const isBeachT = answers.terrain==='beach';
      const isMtnT   = answers.terrain==='mountain';
      for (let i=0;i<10;i++) {
        const lx=(Math.random()-0.5)*100;
        // Beach: lights only on green zone (z > 30). Mountain: spread on whole ground
        const lz = isBeachT ? 30+Math.random()*80 : (Math.random()-0.5)*140;
        naturalLights.push({x:lx,z:lz});
      }
      naturalLights.forEach(l=>spawnStreetLight(l.x,l.z));
      updateStreetLights();
    } else {
      showNotice(val==='hustle'?"Rush hour begins!":"Quiet streets forming...");
      spawnCars(val==='hustle'?18:8);
      LIGHT_SPOTS.forEach(s=>spawnStreetLight(s.x,s.z));
      updateStreetLights();
    }
  }
}

function showNotice(msg) {
  const el=document.getElementById('spawn-notice');
  el.textContent=msg;
  gsap.to(el,{opacity:1,duration:0.3});
  gsap.to(el,{opacity:0,duration:0.4,delay:1.8});
}

function finishQuestions() {
  document.getElementById('question-panel').classList.add('hidden');
  const name=getCityName();
  document.getElementById('city-name-display').textContent=name;
  document.getElementById('hud').classList.add('visible');
  document.getElementById('time-control').classList.add('visible');
  document.getElementById('compass').classList.add('visible');
  document.getElementById('music-btn').classList.add('show');
  document.getElementById('drag-hint').classList.add('visible');
  musicPlaying=true;
  startTerrainMusic(answers.terrain||'plains', answers.vibe||'chill');
  document.getElementById('music-btn').classList.add('playing');
  document.getElementById('music-btn').textContent='♫';
  autoRotate=true;
  document.getElementById('auto-rotate-btn').classList.add('active');
  gsap.to(orbit,{targetRadius:120, duration:2.5, ease:"power2.out"});
  gsap.to(orbit,{targetPhi:1.0, duration:2.5, ease:"power2.out"});
  setTimeout(()=>document.getElementById('drag-hint').classList.remove('visible'),4500);
  cityBuilt=true;
  showNotice("Welcome to "+name+"!");
  loadBirds();
  spawnPeopleForTerrain();
}

function toggleAutoRotate() {
  autoRotate=!autoRotate;
  document.getElementById('auto-rotate-btn').classList.toggle('active',autoRotate);
}
function screenshot() {
  renderer.render(scene,camera);
  const link=document.createElement('a');
  link.download=getCityName().replace(/\s+/g,'-').toLowerCase()+'.png';
  link.href=renderer.domElement.toDataURL('image/png');
  link.click();
  const flash=document.getElementById('flash');
  gsap.to(flash,{opacity:0.85,duration:0.05,onComplete:()=>gsap.to(flash,{opacity:0,duration:0.35})});
}
function startExperience() {
  document.getElementById('intro').classList.add('hidden');
  setTimeout(()=>{
    document.getElementById('question-panel').classList.remove('hidden');
    showQuestion(0);
    if (scene) scene.background=new THREE.Color(0x050810);
  }, 500);
}
