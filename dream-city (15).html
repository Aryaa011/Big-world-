let birdsMixer = null, birdsModel = null;

function loadBirds() {
  try {
    if (typeof THREE.GLTFLoader === 'undefined') { spawnProceduralBirds(); return; }
    const loader = new THREE.GLTFLoader();
    loader.load(BIRDS_DATA, (gltf) => {
      birdsModel = gltf.scene;
      birdsModel.scale.set(0.8, 0.8, 0.8);
      birdsModel.position.set(20, 35, -30);
      scene.add(birdsModel);
      if (gltf.animations && gltf.animations.length > 0) {
        birdsMixer = new THREE.AnimationMixer(birdsModel);
        gltf.animations.forEach(clip => birdsMixer.clipAction(clip).play());
      }
    }, undefined, (err) => {
      // Fallback: procedural birds if GLB fails
      spawnProceduralBirds();
    });
  } catch(e) { spawnProceduralBirds(); }
}

// Procedural birds as fallback — small dark triangles orbiting the scene
const proceduralBirds = [];
function spawnProceduralBirds() {
  const bMat = new THREE.MeshBasicMaterial({color:0x222222});
  for (let i=0;i<(window._isMobile?8:18);i++) {
    const b = new THREE.Group();
    // Left wing
    const lw = new THREE.Mesh(new THREE.PlaneGeometry(1.2,0.4), bMat);
    lw.position.x = -0.7; lw.rotation.z = 0.3; b.add(lw);
    // Right wing
    const rw = new THREE.Mesh(new THREE.PlaneGeometry(1.2,0.4), bMat);
    rw.position.x = 0.7; rw.rotation.z = -0.3; b.add(rw);
    // Body
    const body = new THREE.Mesh(new THREE.BoxGeometry(0.3,0.2,0.6), bMat);
    b.add(body);
    b.userData.birdAngle = (i/8)*Math.PI*2;
    b.userData.birdRadius = 35 + Math.random()*65;
    b.userData.birdHeight = 25 + Math.random()*35;
    b.userData.birdSpeed = 0.3 + Math.random()*0.2;
    b.userData.wingPhase = Math.random()*Math.PI*2;
    scene.add(b);
    proceduralBirds.push(b);
  }
}

// ════════════════════════════════════════
//  PHASE 2: STARS + NIGHT SKY
// ════════════════════════════════════════
let starsDrawn = false;
function drawStars() {
  const canvas = document.getElementById('stars-canvas');
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0,0,canvas.width,canvas.height);
  // Star field
  for (let i=0;i<280;i++) {
    const x = Math.random()*canvas.width;
    const y = Math.random()*canvas.height*0.75; // upper 75% of screen
    const r = Math.random()*1.4;
    const alpha = 0.4 + Math.random()*0.6;
    ctx.beginPath();
    ctx.arc(x,y,r,0,Math.PI*2);
    ctx.fillStyle = `rgba(255,255,240,${alpha})`;
    ctx.fill();
  }
  // A few bright stars with glow
  for (let i=0;i<12;i++) {
    const x=Math.random()*canvas.width, y=Math.random()*canvas.height*0.65;
    const grad = ctx.createRadialGradient(x,y,0,x,y,4);
    grad.addColorStop(0,'rgba(255,255,220,0.9)');
    grad.addColorStop(1,'rgba(255,255,200,0)');
    ctx.beginPath(); ctx.arc(x,y,4,0,Math.PI*2);
    ctx.fillStyle=grad; ctx.fill();
  }
  starsDrawn = true;
}

function applyNightSky() {
  drawStars();
  document.getElementById('stars-canvas').classList.add('show');
  document.getElementById('moon').classList.add('show');
  updateSun3D(22); // hide 3D sun at night
}
function applyDaySky(preset) {
  document.getElementById('stars-canvas').classList.remove('show');
  document.getElementById('moon').classList.remove('show');
  // Sun position is handled by the 3D sunMesh in scene
  updateSun3D(preset);
}

// ════════════════════════════════════════
//  PHASE 3: TERRAIN-SPECIFIC MUSIC
// ════════════════════════════════════════
function startTerrainMusic(terrain, vibe) {
  if (!audioCtx) initAudio();
  if (audioCtx.state==='suspended') audioCtx.resume();
  stopMusic();

  const master = audioCtx.createGain();
  master.gain.setValueAtTime(0, audioCtx.currentTime);
  master.gain.linearRampToValueAtTime(0.42, audioCtx.currentTime+2.5);
  master.connect(audioCtx.destination);
  musicNodes = [master];

  if (terrain === 'plains') {
    // PLAINS: busy urban music — faster rhythm, jazzy chord
    // Bass line with rhythm
    const bpm = vibe==='hustle' ? 128 : 95;
    const beat = 60/bpm;
    // Rhythmic bass hits
    function bassHit(time, freq, dur) {
      const o=audioCtx.createOscillator(), g=audioCtx.createGain();
      o.type='square'; o.frequency.value=freq;
      g.gain.setValueAtTime(0.08,time);
      g.gain.exponentialRampToValueAtTime(0.001,time+dur);
      o.connect(g); g.connect(master); o.start(time); o.stop(time+dur);
    }
    // Chord pads
    const chords = vibe==='hustle'
      ? [130.8,164.8,196,261.6] // Cmaj
      : [110,138.6,164.8,220];  // Am
    chords.forEach((f,i) => {
      const o=audioCtx.createOscillator(), g=audioCtx.createGain();
      o.type='triangle'; o.frequency.value=f; g.gain.value=0.09-i*0.01;
      // Slight detune for richness
      o.detune.value=(Math.random()-0.5)*8;
      o.connect(g); g.connect(master); o.start(); musicNodes.push(o,g);
    });
    // Rhythmic bass line
    let nextBeat = audioCtx.currentTime+0.1;
    function schedBass() {
      if (!musicPlaying) return;
      bassHit(nextBeat,      65, beat*0.4);
      bassHit(nextBeat+beat*0.25, 82, beat*0.15);
      bassHit(nextBeat+beat*0.5, 55, beat*0.35);
      bassHit(nextBeat+beat*0.75, 73, beat*0.15);
      nextBeat += beat;
      setTimeout(schedBass, beat*900);
    }
    schedBass();
    // Hi-hat
    function hat() {
      if (!musicPlaying) return;
      const buf=audioCtx.createBuffer(1,Math.floor(audioCtx.sampleRate*0.05),audioCtx.sampleRate);
      const d=buf.getChannelData(0);
      for(let i=0;i<d.length;i++) d[i]=(Math.random()*2-1)*Math.pow(1-i/d.length,3.5)*0.4;
      const s=audioCtx.createBufferSource(), hg=audioCtx.createGain();
      hg.gain.value=0.18; s.buffer=buf; s.connect(hg); hg.connect(master); s.start();
      setTimeout(hat, beat*500);
    }
    hat();

  } else if (terrain === 'beach') {
    // BEACH: funky upbeat — bright synth, steel drum feel
    // Bright chord stabs
    const beachNotes = [261.6, 329.6, 392, 523.2]; // C maj
    function stab(time, freq, dur) {
      const o=audioCtx.createOscillator(), g=audioCtx.createGain();
      o.type='sine'; o.frequency.value=freq;
      g.gain.setValueAtTime(0.22,time);
      g.gain.exponentialRampToValueAtTime(0.001,time+dur);
      o.connect(g); g.connect(master); o.start(time); o.stop(time+dur);
    }
    // Ambient ocean + bright pad
    // Beach pad — warm major chord
    [261.6,329.6,392,523.2].forEach((f,i)=>{
      const o=audioCtx.createOscillator(),g=audioCtx.createGain();
      o.type='sine'; o.frequency.value=f; g.gain.value=0.10-i*0.018;
      o.detune.value=(Math.random()-0.5)*6;
      o.connect(g); g.connect(master); o.start(); musicNodes.push(o,g);
    });
    // Steel drum rhythm pattern
    const pattern=[0,2,4,6,8,10,12,14];
    let si=0;
    function beachRhythm() {
      if (!musicPlaying) return;
      const t = audioCtx.currentTime;
      const note = beachNotes[si%beachNotes.length];
      stab(t,note,0.28); stab(t+0.06,note*1.333,0.18); stab(t+0.14,note*0.75,0.12);
      si++; setTimeout(beachRhythm, 320+Math.random()*80);
    }
    beachRhythm();
    // Bongo-style percussion
    function bongo() {
      if (!musicPlaying) return;
      const buf=audioCtx.createBuffer(1,Math.floor(audioCtx.sampleRate*0.1),audioCtx.sampleRate);
      const d=buf.getChannelData(0);
      for(let i=0;i<d.length;i++) d[i]=(Math.random()*2-1)*Math.pow(1-i/d.length,3)*0.3;
      const s=audioCtx.createBufferSource(), g=audioCtx.createGain();
      g.gain.value=0.18; s.buffer=buf; s.connect(g); g.connect(master); s.start();
      setTimeout(bongo, 200+Math.random()*140);
    }
    bongo();
    // Wave sound — low rumble
    const wave=audioCtx.createOscillator(), wg=audioCtx.createGain();
    wave.type='sine'; wave.frequency.value=60; wg.gain.value=0.03;
    wave.connect(wg); wg.connect(master); wave.start();
    musicNodes.push(wave,wg);

  } else {
    // MOUNTAIN: calm, peaceful — soft pads, nature ambience
    // Slow ambient chord: Amaj7
    [220,277.2,329.6,415.3,554.4].forEach((f,i)=>{
      const o=audioCtx.createOscillator(), g=audioCtx.createGain();
      o.type='sine'; o.frequency.value=f; g.gain.value=0.12-i*0.018;
      // Slight vibrato
      const lfo=audioCtx.createOscillator(), lfog=audioCtx.createGain();
      lfo.frequency.value=0.3; lfog.gain.value=1.5;
      lfo.connect(lfog); lfog.connect(o.frequency);
      lfo.start(); musicNodes.push(lfo,lfog);
      o.connect(g); g.connect(master); o.start(); musicNodes.push(o,g);
    });
    // Wind: filtered noise
    const wBuf=audioCtx.createBuffer(1,audioCtx.sampleRate*2,audioCtx.sampleRate);
    const wd=wBuf.getChannelData(0);
    for(let i=0;i<wd.length;i++) wd[i]=(Math.random()*2-1)*0.4;
    const wSrc=audioCtx.createBufferSource();
    wSrc.buffer=wBuf; wSrc.loop=true;
    const wFilter=audioCtx.createBiquadFilter();
    wFilter.type='lowpass'; wFilter.frequency.value=400;
    const wGain=audioCtx.createGain(); wGain.gain.value=0.08;
    wSrc.connect(wFilter); wFilter.connect(wGain); wGain.connect(master);
    wSrc.start(); musicNodes.push(wSrc,wFilter,wGain);
    // Occasional gentle bell tone
    function bell() {
      if (!musicPlaying) return;
      const o=audioCtx.createOscillator(), g=audioCtx.createGain();
      const notes=[440,554.4,659.3,880];
      o.type='sine'; o.frequency.value=notes[Math.floor(Math.random()*notes.length)];
      g.gain.setValueAtTime(0.18,audioCtx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+3.5);
      o.connect(g); g.connect(master); o.start(); o.stop(audioCtx.currentTime+2.5);
      setTimeout(bell, 2500+Math.random()*4000);
    }
    bell();
  }
}

// ════════════════════════════════════════
//  PHASE 3: BIRDS ANIMATION in render loop
// ════════════════════════════════════════
function animateBirds(t, dt) {
  // Update GLB mixer if loaded
  if (birdsMixer) {
    birdsMixer.update(dt);
    if (birdsModel) {
      // Orbit the scene slowly
      birdsModel.position.x = Math.sin(t*0.12)*55;
      birdsModel.position.z = Math.cos(t*0.12)*55 - 20;
      birdsModel.position.y = 28 + Math.sin(t*0.3)*5;
      birdsModel.rotation.y = -t*0.12 + Math.PI/2;
    }
  }
  // Animate procedural birds
  proceduralBirds.forEach(b => {
    b.userData.birdAngle += b.userData.birdSpeed * dt;
    const a = b.userData.birdAngle;
    const r = b.userData.birdRadius;
    b.position.set(Math.sin(a)*r, b.userData.birdHeight+Math.sin(t*0.5+a)*3, Math.cos(a)*r);
    b.rotation.y = -a + Math.PI/2;
    // Wing flap
    if (b.children[0]) b.children[0].rotation.z = 0.3+Math.sin(t*4+b.userData.wingPhase)*0.5;
    if (b.children[1]) b.children[1].rotation.z = -(0.3+Math.sin(t*4+b.userData.wingPhase)*0.5);
  });
}


// ════════════════════════════════════════
//  3D SUN MESH (fixed in sky, not DOM)
// ════════════════════════════════════════
let sunMesh = null, sunGlow = null;

function createSun3D() {
  if (!scene) return;
  // Sun sphere
  const sunMat = new THREE.MeshBasicMaterial({color:0xFFEE88});
  sunMesh = new THREE.Mesh(new THREE.SphereGeometry(3.5,16,16), sunMat);
  scene.add(sunMesh);
  // Glow halo — slightly larger transparent sphere
  const glowMat = new THREE.MeshBasicMaterial({color:0xFFCC44, transparent:true, opacity:0.18, side:THREE.BackSide});
  sunGlow = new THREE.Mesh(new THREE.SphereGeometry(6,16,16), glowMat);
  sunMesh.add(sunGlow);
  updateSun3D(14);
}

function updateSun3D(h) {
  if (!sunMesh) return;
  const isNight = h >= 20 || h <= 5;
  if (isNight) { sunMesh.visible=false; return; }
  sunMesh.visible = true;
  // Arc: h=6 → east horizon, h=12 → zenith, h=18 → west horizon
  const t = ((h-6)/12)*Math.PI; // 0=east, π=west
  const radius = 140;
  sunMesh.position.set(Math.cos(t)*radius, Math.sin(t)*radius*0.75+8, -80);
  // Colour by time
  if (h<=8)      sunMesh.material.color.setHex(0xFF9040); // sunrise orange
  else if (h<=11) sunMesh.material.color.setHex(0xFFDD60); // morning yellow
  else if (h<=15) sunMesh.material.color.setHex(0xFFFFCC); // noon white-yellow
  else if (h<=17) sunMesh.material.color.setHex(0xFFCC44); // afternoon gold
  else            sunMesh.material.color.setHex(0xFF6020); // sunset red
}

function makePivot(parent, y) {
  // A pivot group placed at the joint, child mesh hangs below
  const pivot = new THREE.Group();
  pivot.position.y = y;
  parent.add(pivot);
  return pivot;
}

function spawnPeopleForTerrain() {
  const terrain = answers.terrain||'plains';
  const isBeach = terrain==='beach';
  const isMtn   = terrain==='mountain';
  const count   = window._isMobile ? (answers.size==='big' ? 10 : 6) : (answers.size==='big' ? 22 : 12);

  for (let i=0;i<count;i++) {
    let px, pz;
    if (isBeach) {
      const zone = Math.random()<0.4 ? 'sand' : 'jungle';
      px=(Math.random()-0.5)*140;
      pz= zone==='sand' ? -8+Math.random()*28 : 32+Math.random()*75;
    } else if (isMtn) {
      px=(Math.random()-0.5)*160;
      pz=-55+Math.random()*110;
    } else {
      // Plains — STRICTLY on block areas (between roads), never on road surface
      // Block centres: -85,-30,30,85 — pick one and place person in safe block zone
      const BLK_POS = [-85,-30,30,85];
      let attempt=0;
      do {
        const bx=BLK_POS[Math.floor(Math.random()*BLK_POS.length)];
        const bz=BLK_POS[Math.floor(Math.random()*BLK_POS.length)];
        px=bx+(Math.random()-0.5)*18;
        pz=bz+(Math.random()-0.5)*18;
        attempt++;
      } while(onRoad(px,pz) && attempt<20);
    }
    spawnPerson(px, pz, i*0.15);
  }

  // Create 3-4 conversation pairs after all people spawned
  setTimeout(()=>{
    const shuffled=[...people].sort(()=>Math.random()-0.5);
    const pairCount=Math.min(4, Math.floor(shuffled.length/2));
    for(let i=0;i<pairCount;i++){
      const pA=shuffled[i*2], pB=shuffled[i*2+1];
      if(!pA||!pB) break;
      startChat(pA,pB);
    }
  }, count*150+1000);
}

function startChat(pA, pB) {
  // Move them close together and face each other
  const cx=(pA.position.x+pB.position.x)/2;
  const cz=(pA.position.z+pB.position.z)/2;
  const spread=2.2;
  pA.userData.chatting=true; pA.userData.chatTarget=pB;
  pA.userData.walkCentre={x:cx+spread, z:cz};
  pB.userData.chatting=true; pB.userData.chatTarget=pA;
  pB.userData.walkCentre={x:cx-spread, z:cz};
  pA.userData.chatTimer=15+Math.random()*30; // chat for 15-45 seconds then wander again
}

function animatePeople(t) {
  if (!people.length || !cityBuilt) return;
  people.forEach(p => {
    if (!p.visible) return;
    const ud=p.userData;

    // Tick chat timer
    if (ud.chatting && ud.chatTimer>0) {
      ud.chatTimer -= 0.016;
      if (ud.chatTimer<=0) { ud.chatting=false; ud.chatTarget=null; }
    }

    if (ud.chatting) {
      // Move slowly toward chat position and face partner
      const tx=ud.walkCentre.x, tz=ud.walkCentre.z;
      p.position.x+=(tx-p.position.x)*0.03;
      p.position.z+=(tz-p.position.z)*0.03;
      if (ud.chatTarget) {
        const dx=ud.chatTarget.position.x-p.position.x;
        const dz=ud.chatTarget.position.z-p.position.z;
        p.rotation.y=Math.atan2(dx,dz);
      }
      // Gentle nodding head bob while chatting
      const headBob=Math.sin(t*1.2+ud.legPhase)*0.04;
      p.children[0] && (p.children[0].position.y=1.82+headBob);
      // Arms slightly raised in gesturing
      if (ud.lShoulder) ud.lShoulder.rotation.x=Math.sin(t*0.8+ud.legPhase)*0.2-0.1;
      if (ud.rShoulder) ud.rShoulder.rotation.x=Math.sin(t*0.9+ud.legPhase+1)*0.2-0.1;
      // Legs still
      if (ud.lHip) ud.lHip.rotation.x=0;
      if (ud.rHip) ud.rHip.rotation.x=0;
      return;
    }

    // ── Walking movement ──
    ud.walkAngle += ud.walkSpeed * 0.016; // slow, frame-rate aware
    const wa=ud.walkAngle;
    const wr=ud.walkRadius;
    const cx=ud.walkCentre.x, cz=ud.walkCentre.z;
    const nx=cx+Math.sin(wa)*wr;
    const nz=cz+Math.cos(wa)*wr;
    // Smooth position — clamp to block if on road
    let targX=nx, targZ=nz;
    if (onRoad(targX,targZ)) {
      // Reverse angle so they walk away from road
      ud.walkAngle += Math.PI;
      targX=cx; targZ=cz;
    }
    p.position.x+=(targX-p.position.x)*0.025;
    p.position.z+=(targZ-p.position.z)*0.025;
    // Face direction of motion
    const dx=nx-p.position.x, dz=nz-p.position.z;
    if (Math.abs(dx)+Math.abs(dz)>0.01) p.rotation.y=Math.atan2(dx,dz);

    // ── Limb animation — pivot-based so they actually swing ──
    const walkFreq = ud.walkSpeed * 18; // faster legs = faster walk speed
    const lp=t*walkFreq + ud.legPhase;
    const swing=0.55; // degrees of swing

    // Hips pivot: left and right legs swing opposite
    if (ud.lHip) ud.lHip.rotation.x=Math.sin(lp)*swing;
    if (ud.rHip) ud.rHip.rotation.x=-Math.sin(lp)*swing;
    // Shoulders swing opposite to legs (natural gait)
    if (ud.lShoulder) ud.lShoulder.rotation.x=-Math.sin(lp)*swing*0.65;
    if (ud.rShoulder) ud.rShoulder.rotation.x=Math.sin(lp)*swing*0.65;
    // Slight body bob
    p.position.y=Math.abs(Math.sin(lp))*0.04;
  });
}

// ── Hover detection ──
const raycaster2 = new THREE.Raycaster();
const mouse2 = new THREE.Vector2();
let hoveredPerson = null;

window.addEventListener('mousemove', e => {
  if (exploreMode || !cityBuilt || !people.length) return;
  mouse2.x = (e.clientX/window.innerWidth)*2-1;
  mouse2.y = -(e.clientY/window.innerHeight)*2+1;
  raycaster2.far = 1000;
  raycaster2.setFromCamera(mouse2, camera);
  const hits = raycaster2.intersectObjects(people, true);
  const hint = document.getElementById('talk-hint');
  if (hits.length>0) {
    let obj = hits[0].object;
    while(obj.parent && !obj.userData.isHuman) obj=obj.parent;
    if (obj.userData.isHuman) {
      hoveredPerson = obj;
      hint.style.display='block';
      hint.style.left=(e.clientX+14)+'px';
      hint.style.top=(e.clientY-10)+'px';
      hint.textContent='💬 Talk to '+obj.userData.name;
      document.body.style.cursor='pointer';
      return;
    }
  }
  hoveredPerson=null;
  hint.style.display='none';
  document.body.style.cursor='';
});

// Click + touch to talk — registered after renderer init via registerPeopleInput()
function talkToNearest() {
  if (!people.length) return;
  // Find closest person to camera position
  const camPos = camera.position;
  let closest = null, closestDist = Infinity;
  people.forEach(p => {
    if (!p.visible) return;
    const dx = p.position.x - camPos.x;
    const dz = p.position.z - camPos.z;
    const dist = Math.sqrt(dx*dx + dz*dz);
    if (dist < closestDist) { closestDist = dist; closest = p; }
  });
  // Talk if within 30 units (generous range)
  if (closest && closestDist < 30) {
    // Exit explore mode briefly so convo panel shows properly
    if (exploreMode) {
      if (document.pointerLockElement) document.exitPointerLock();
      pointerLocked = false;
    }
    openConvo(closest);
  } else if (closest) {
    showNotice('Walk closer to talk! (press E)');
  }
}

function findPersonFromEvent(clientX, clientY) {
  // Fresh raycast — don't rely on mousemove having fired
  const mx=(clientX/window.innerWidth)*2-1;
  const my=-(clientY/window.innerHeight)*2+1;
  raycaster2.setFromCamera(new THREE.Vector2(mx,my), camera);
  // Extend ray length for easier clicking
  raycaster2.far = 1000;
  const hits=raycaster2.intersectObjects(people, true);
  if (hits.length>0) {
    let obj=hits[0].object;
    let depth=0;
    while(obj && !obj.userData.isHuman && obj.parent && depth<10) {
      obj=obj.parent; depth++;
    }
    if (obj && obj.userData.isHuman) return obj;
  }
  return null;
}

function registerPeopleInput() {
  renderer.domElement.addEventListener('click', e => {
    if (exploreMode) return;
    const person = findPersonFromEvent(e.clientX, e.clientY);
    if (person) { openConvo(person); e.stopPropagation(); }
    else if (document.getElementById('convo-panel').classList.contains('open')) {
      // Clicked empty space — close convo
      closeConvo();
    }
  });
  renderer.domElement.addEventListener('touchend', e => {
    if (exploreMode) return;
    if (document.getElementById('convo-panel').classList.contains('open')) return;
    const touch = e.changedTouches[0];
    const person = findPersonFromEvent(touch.clientX, touch.clientY);
    if (person) { openConvo(person); }
  },{passive:true});
}

// ── Conversation panel ──
function openConvo(person) {
  activePerson = person;
  convoHistory = [];
  // Pause this person's walking while in conversation
  person.userData._savedChatting = person.userData.chatting;
  person.userData.chatting = true;
  person.userData.chatTimer = 999; // hold until convo closes
  personContext = `You are ${person.userData.name}, a ${person.userData.personality} person living in ${getCityName()}. Keep responses SHORT (1-3 sentences), warm, in-character. Never break character. The city is a ${answers.terrain||'plains'} ${answers.size||'small'} ${answers.vibe||'chill'} place.`;
  document.getElementById('convo-name').textContent = person.userData.name;
  document.getElementById('convo-avatar').textContent = person.userData.emoji;
  document.getElementById('convo-messages').innerHTML='';
  document.getElementById('convo-panel').classList.add('open');
  document.getElementById('convo-input').focus();
  // Opening greeting from the person
  const greetings=[
    `Hey there! Welcome to ${getCityName()}!`,
    `Oh hello! Lovely day, isn't it?`,
    `Hi! First time here?`,
    `Hey! You look new around here!`
  ];
  addBubble(greetings[Math.floor(Math.random()*greetings.length)], 'person');
}

function closeConvo() {
  document.getElementById('convo-panel').classList.remove('open');
  if (activePerson) {
    activePerson.userData.chatting = activePerson.userData._savedChatting || false;
    activePerson.userData.chatTimer = 0;
  }
  activePerson=null; convoHistory=[];
}

function addBubble(text, who) {
  const div=document.createElement('div');
  div.className='convo-bubble'+(who==='user'?' user':'');
  div.textContent=text;
  const msgs=document.getElementById('convo-messages');
  msgs.appendChild(div);
  msgs.scrollTop=msgs.scrollHeight;
}

async function sendMessage() {
  const input=document.getElementById('convo-input');
  const text=input.value.trim();
  if (!text||!activePerson) return;
  input.value='';
  addBubble(text,'user');
  convoHistory.push({role:'user',content:text});

  // Typing indicator
  const typing=document.createElement('div');
  typing.className='convo-typing'; typing.textContent=activePerson.userData.name+' is thinking...';
  document.getElementById('convo-messages').appendChild(typing);

  try {
    const messages=[
      {role:'system',content:personContext},
      ...convoHistory.slice(-6)
    ];
    const res=await fetch('https://text.pollinations.ai/openai',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({model:'openai',messages,max_tokens:120})
    });
    const data=await res.json();
    typing.remove();
    const reply=data.choices?.[0]?.message?.content||'*smiles and nods*';
    convoHistory.push({role:'assistant',content:reply});
    addBubble(reply,'person');
  } catch(e) {
    typing.remove();
    const fallbacks=[
      "Sorry, I lost my train of thought!",
      "The wind took my words away...",
      "Hmm, let me think on that.",
      "*nods thoughtfully*"
    ];
    addBubble(fallbacks[Math.floor(Math.random()*fallbacks.length)],'person');
  }
}

// ── Add Escape key to close convo ──
window.addEventListener('keydown', e => {
  if (e.key==='Escape' && document.getElementById('convo-panel').classList.contains('open')) {
    closeConvo(); return;
  }
});
